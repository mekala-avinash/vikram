          NIP: '#/components/schemas/NipIdentifier'
          EU: '#/components/schemas/EUIdentifier'
          OTHER: '#/components/schemas/OtherIdentifier'
          INTERNAL: '#/components/schemas/InternalIdentifier'
      anyOf:
        - $ref: '#/components/schemas/NipIdentifier'
        - $ref: '#/components/schemas/EUIdentifier'
        - $ref: '#/components/schemas/OtherIdentifier'
        - $ref: '#/components/schemas/InternalIdentifier'
    Name:
      description: Name of company or private individual or any other entity.
      type: string
      minLength: 1
      maxLength: 512
      examples:
        - Exorigo-Upos S.A
        - Jan Kowalski
    NamedIdentity:
      description: Represents Identity that has to have name (required).
      properties:
        taxId:
          description: Identity tax identifier (for Private Individuals can be `null`).
          $ref: '#/components/schemas/Identifier'
        name:
          $ref: '#/components/schemas/Name'
      required:
        - name
    Address:
      description: |
        Address.
      properties:
        countryCode:
          $ref: '#/components/schemas/CountryCode'
        line1:
          description: |
            First line of address.
          type: string
          minLength: 1
          maxLength: 512
        line2:
          description: |
            Second line of address.
          type: string
          minLength: 1
          maxLength: 512
        gln:
          description: |
            Global Location Number.  
            See: https://www.gs1uk.org/support-training/help-to-use-and-implement-gs1-standards/create-and-use-global-location-numbers
          type: string
          minLength: 1
          maxLength: 13
      required:
        - countryCode
        - line1
    CarrierParty:
      description: Carrier party (in transport procedure).
      properties:
        identity:
          description: Carrier identity.
          $ref: '#/components/schemas/NamedIdentity'
        address:
          description: Carrier address.
          $ref: '#/components/schemas/Address'
      required:
        - identity
        - address
    CargoDescriptionType:
      description: |
        | Type | Description |
        | - | -- |
        | CHURN | Churn |
        | BARREL | Barrel |
        | CYLINDER | Cylinder | 
        | CARTON | Carton |
        | CANISTER | Canister |
        | CAGE | Cage |
        | CONTAINER | Container (eg. used on Containership) |
        | BASKET | Basket |
        | PUNNET | Punnet |
        | COLLECTIVE_PACKAGING | Collective packaging |
        | PACK | Pack |
        | PACKAGE | Package |
        | PALETTE | Palette |
        | SIMPLE_CONTAINER | Simple container (eg. plastic container) |
        | SOLIDS_CONTAINER | Solids container (Container for solid bulk cargo) |
        | LIQUID_CONTAINER | Liquid container (Container for bulk cargo in liquid form) |
        | BOX | Box |
        | CAN | Can |
        | CHEST | Chest |
        | BAG | Bag |
      type: string
      format: enum
      enum:
        - CHURN
        - BARREL
        - CYLINDER
        - CARTON
        - CANISTER
        - CAGE
        - CONTAINER
        - BASKET
        - PUNNET
        - COLLECTIVE_PACKAGING
        - PACK
        - PACKAGE
        - PALETTE
        - SIMPLE_CONTAINER
        - LIQUID_CONTAINER
        - SOLIDS_CONTAINER
        - BOX
        - CAN
        - CHEST
        - BAG
      example: BAG
    CargoDescriptionOther:
      description: Other Load type description.
      type: string
      minLength: 1
      maxLength: 50
    CargoDescription:
      description: Cargo description (one of defined or custom).
      anyOf:
        - $ref: '#/components/schemas/CargoDescriptionType'
        - $ref: '#/components/schemas/CargoDescriptionOther'
    Cargo:
      description: Cargo.
      properties:
        description:
          $ref: '#/components/schemas/CargoDescription'
        unit:
          description: Unit related to type.
          type: string
          minLength: 1
          maxLength: 50
      required:
        - description
    Transport:
      description: Transport.
      properties:
        description:
          $ref: '#/components/schemas/TransportDescription'
        carrier:
          $ref: '#/components/schemas/CarrierParty'
        number:
          description: Transport number.
          type: string
          minLength: 1
          maxLength: 256
        intermediaryPartyStandardFlag:
          description: |
            Should be set if transport is supported by other than first order deliverer.  
            See: `art. 22 ust. 2d ustawy o VAT`.  
            The field applies to a situation in which the entity participates in a chain transaction other than the simplified tripartite procedure referred to in.  
            See: `art. 135 ust. 1 pkt 4 ustawy o VAT`.  
            This flag should be set in opposite to `item.intermediaryPartySimplifiedProcedureFlag`
          type: boolean
        cargo:
          $ref: '#/components/schemas/Cargo'
        beginDateTime:
          description: Transport begin date time (if started).
          type: string
          format: date-time
        endDateTime:
          description: Transport end date time (if delivered).
          type: string
          format: date-time
        initialAddress:
          description: |
            Transport initial address.
          $ref: '#/components/schemas/Address'
        intermediateAddresses:
          description: Transport intermediate addresses.
          type: array
          items:
            description: Transport intermediate destination address.
            $ref: '#/components/schemas/Address'
        finalAddress:
          description: |
            Transport final address.
          $ref: '#/components/schemas/Address'
      required:
        - cargo
        - description
    Transports:
      type: array
      items:
        $ref: '#/components/schemas/Transport'
    TransactionTerms:
      description: Transaction terms (if exists).
      properties:
        origins:
          $ref: '#/components/schemas/TransactionOrigins'
        lotNumbers:
          description: Lot numbers.
          type: array
          items:
            description: Lot number.
            type: string
            minLength: 1
            maxLength: 256
        deliveryTerms:
          description: Delivery terms. The so-called Incoterms.
          type: string
          minLength: 1
          maxLength: 256
        exchange:
          $ref: '#/components/schemas/Exchange'
        transports:
          $ref: '#/components/schemas/Transports'
    PaymentType:
      description: |
        | Type | Description |
        | - | --- |
        | PAID | Paid payment type. |
        | UNPAID | Unpaid payment type. |
      type: string
      format: enum
      enum:
        - PAID
        - UNPAID
    PaymentMethodType:
      description: |
        | Type | Description |
        | - | --- |
        | CASH | Cash payment method type |
        | CARD | Card payment method type |
        | VOUCHER | Voucher payment method type |
        | CHECK | Check payment method type |
        | CREDIT | Credit payment method type |
        | TRANSFER | Transfer (Bank transfer) payment method type |
        | MOBILE | Mobile payment method type |
        | OTHER | Other payment method type |
      type: string
      enum:
        - CASH
        - CARD
        - VOUCHER
        - CHECK
        - CREDIT
        - TRANSFER
        - MOBILE
        - OTHER
    AbstractPaymentMethod:
      properties:
        type:
          $ref: '#/components/schemas/PaymentMethodType'
      required:
        - type
    CashPaymentMethod:
      allOf:
        - $ref: '#/components/schemas/AbstractPaymentMethod'
        - description: Cash payment method.
          properties:
            type:
              const: CASH
    CardPaymentMethod:
      allOf:
        - $ref: '#/components/schemas/AbstractPaymentMethod'
        - description: Card payment method.
          properties:
            type:
              const: CARD
    VoucherPaymentMethod:
      allOf:
        - $ref: '#/components/schemas/AbstractPaymentMethod'
        - description: Voucher payment method.
          properties:
            type:
              const: VOUCHER
    CheckPaymentMethod:
      allOf:
        - $ref: '#/components/schemas/AbstractPaymentMethod'
        - description: Check payment method.
          properties:
            type:
              const: CHECK
    BankAccountNumberType:
      description: |
        | Type | Description |
        | - | --- |
        | BBAN | Basic Bank account number type (in Poland known also as NRB) |
        | IBAN | International bank account number type |
      type: string
      format: enum
    AbstractBankAccountNumber:
      properties:
        type:
          $ref: '#/components/schemas/BankAccountNumberType'
          additionalProperties: true
        number:
          type: string
          additionalProperties: true
      required:
        - type
        - number
    BasicBankAccountNumber:
      allOf:
        - $ref: '#/components/schemas/AbstractBankAccountNumber'
        - description: Basic bank account number (in Poland also known as NRB).
          properties:
            type:
              const: BBAN
              example: BBAN
            number:
              description: Account number in basic bank account number format.
              type: string
              pattern: '[0-9]{26}'
              example: '109010140000071219812874'
          required:
            - type
            - number
    InternationalBankAccountNumber:
      allOf:
        - $ref: '#/components/schemas/AbstractBankAccountNumber'
        - description: International bank account number.
          properties:
            type:
              const: IBAN
              example: IBAN
            number:
              description: Account number in international bank account number format.
              minLength: 10
              maxLength: 34
              example: PL61109010140000071219812874
            swift:
              type: string
              pattern: '[A-Z]{6}[A-Z0-9]{2}([A-Z0-9]{3}){0,1}'
              example: BIGBPLPWXXX
          required:
            - type
            - number
            - swift
    BankAccountNumber:
      description: Bank account number by type.
      properties:
        type:
          $ref: '#/components/schemas/BankAccountNumberType'
      required:
        - type
      discriminator:
        propertyName: type
        mapping:
          BBAN: '#/components/schemas/BasicBankAccountNumber'
          IBAN: '#/components/schemas/InternationalBankAccountNumber'
      oneOf:
        - $ref: '#/components/schemas/BasicBankAccountNumber'
        - $ref: '#/components/schemas/InternationalBankAccountNumber'
    BankOwnAccountType:
      description: |
        Bank's own account type.
        | Type | Description |
        | - | -- |
        | RECEIVABLES_ASSIGNMENT  | a bank account or a cooperative savings and credit union account used to make settlements on account of cash receivables purchased by this bank or this union |
        | FACTORING | a bank account or an account of a cooperative savings and credit union used by this bank or this union to collect receivables from the buyer of goods or service recipients for the supply of goods or services, confirmed by an invoice, and to transfer it in whole or in part to the supplier of goods or service provider |
        | OWN_ECONOMY | a bank account or an account of a cooperative savings and credit union kept by this bank or this union as part of its own economy, other than a settlement account |
      type: string
      format: enum
      enum:
        - RECEIVABLES_ASSIGNMENT
        - FACTORING
        - OWN_ECONOMY
    BankAccount:
      description: Bank account data.
      properties:
        number:
          $ref: '#/components/schemas/BankAccountNumber'
        bankName:
          description: Bank name.
          type: string
          minLength: 1
          maxLength: 256
          example: ING Bank Śląski
        bankOwnAccountType:
          description: When account number is owned by Bank itself the type should be specified.
          $ref: '#/components/schemas/BankOwnAccountType'
        description:
          description: Bank account description.
          type: string
          minLength: 1
          maxLength: 256
      required:
        - number
    BankAccounts:
      type: array
      description: List of accounts.
      items:
        $ref: '#/components/schemas/BankAccount'
    CreditPaymentMethod:
      allOf:
        - $ref: '#/components/schemas/AbstractPaymentMethod'
        - description: Credit payment method.
          properties:
            type:
              const: CREDIT
            account:
              $ref: '#/components/schemas/BankAccounts'
    TransferPaymentMethod:
      allOf:
        - $ref: '#/components/schemas/AbstractPaymentMethod'
        - description: Bank transfer payment method.
          properties:
            type:
              const: TRANSFER
            account:
              $ref: '#/components/schemas/BankAccounts'
    MobilePaymentMethod:
      allOf:
        - $ref: '#/components/schemas/AbstractPaymentMethod'
        - description: Mobile payment method.
          properties:
            type:
              const: MOBILE
    OtherPaymentMethod:
      allOf:
        - $ref: '#/components/schemas/AbstractPaymentMethod'
        - description: Other payment method.
          properties:
            type:
              const: OTHER
            description:
              description: Other payment method description.
              type: string
              maxLength: 240
          required:
            - type
            - description
    PaymentMethod:
      description: Payment method by type. KSeF does not allow for many payments methods therefore only one method (from first payment) will be sent to KSeF.
      properties:
        type:
          $ref: '#/components/schemas/PaymentMethodType'
      required:
        - type
      discriminator:
        propertyName: type
        mapping:
          CASH: '#/components/schemas/CashPaymentMethod'
          CARD: '#/components/schemas/CardPaymentMethod'
          VOUCHER: '#/components/schemas/VoucherPaymentMethod'
          CHECK: '#/components/schemas/CheckPaymentMethod'
          CREDIT: '#/components/schemas/CreditPaymentMethod'
          TRANSFER: '#/components/schemas/TransferPaymentMethod'
          MOBILE: '#/components/schemas/MobilePaymentMethod'
          OTHER: '#/components/schemas/OtherPaymentMethod'
      anyOf:
        - $ref: '#/components/schemas/CashPaymentMethod'
        - $ref: '#/components/schemas/CardPaymentMethod'
        - $ref: '#/components/schemas/VoucherPaymentMethod'
        - $ref: '#/components/schemas/CheckPaymentMethod'
        - $ref: '#/components/schemas/CreditPaymentMethod'
        - $ref: '#/components/schemas/TransferPaymentMethod'
        - $ref: '#/components/schemas/MobilePaymentMethod'
        - $ref: '#/components/schemas/OtherPaymentMethod'
    AbstractPayment:
      properties:
        type:
          $ref: '#/components/schemas/PaymentType'
        method:
          $ref: '#/components/schemas/PaymentMethod'
        date:
          type: string
          format: date
        amount:
          $ref: '#/components/schemas/MoneyAmount'
      required:
        - type
        - amount
    PaidPayment:
      allOf:
        - $ref: '#/components/schemas/AbstractPayment'
        - description: A paid payment with payment date.
          properties:
            type:
              const: PAID
            date:
              description: The date of receiving the payment.
            amount:
              description: The amount of the received payment.
          required:
            - type
            - date
            - amount
          example:
            type: PAID
            method:
              type: VOUCHER
            date: '2022-07-06'
            amount: 2000
            description: ASDF1234
    UnpaidPayment:
      allOf:
        - $ref: '#/components/schemas/AbstractPayment'
        - description: Unpaid payment with due date.
          properties:
            type:
              const: UNPAID
            date:
              description: |
                Payment due date.

                ⚠️ <span style="color:red">**For FA(2) it's required.**</span>
            description:
              description: |
                Additional payment description.

                ⚠️ <span style="color:red">**Only applicable for FA(2). For FA(3) it's ignored (has been replaced by `term` structure).**</span>
              type: string
              maxLength: 240
            term:
              description: |
                Payment term description.

                ⚠️ <span style="color:red">**Only applicable for FA(3). For FA(2) it's ignored.**</span>
              properties:
                valueOfPeriod:
                  description: The quantity is specified, e.g., days, by which the payment term for the invoice is calculated (e.g., "14").
                  type: integer
                  minimum: 1
                unitOfPeriod:
                  description: The time unit is specified in which the payment term for the invoice is calculated (e.g., day, week, etc.).
                  type: string
                  maxLength: 50
                startOfPeriod:
                  description: The initial event is specified from which the payment term for the invoice is calculated (e.g., invoice issuance).
                  type: string
                  maxLength: 256
              required:
                - valueOfPeriod
                - unitOfPeriod
                - startOfPeriod
            amount:
              description: Payment amount to pay.
            link:
              description: |
                Payment link (for online payment).

                ⚠️ <span style="color:red">**Only applicable for FA(3). For FA(2) it's ignored.**</span>
              type: string
              maxLength: 512
              pattern: ^(https?)://([a-zA-Z0-9][a-zA-Z0-9-]*\.)+[a-zA-Z]{2,}(:[0-9]{1,5})?(/[^\s?#]*)?\?([^#\s]*&)?IPKSeF=[0-9]{3}[a-zA-Z0-9]{10}(&[^#\s]*)?(#.*)?$
            ksefId:
              description: |
                Payment identifier in KSeF.

                ⚠️ <span style="color:red">**Only applicable for FA(3). For FA(2) it's ignored.**</span>
              type: string
              minLength: 13
              maxLength: 13
              pattern: ^[0-9]{3}[a-zA-Z0-9]{10}$
          required:
            - type
          example:
            type: UNPAID
            method:
              type: TRANSFER
              account:
                type: BBAN
                number: '109010140000071852892874'
              bankName: ING Bank Śląski
            date: '2022-07-13'
            amount: 5000
            description: rata 2 z 2
    Payment:
      description: Payment by type.
      properties:
        type:
          $ref: '#/components/schemas/PaymentType'
      required:
        - type
      discriminator:
        propertyName: type
        mapping:
          PAID: '#/components/schemas/PaidPayment'
          UNPAID: '#/components/schemas/UnpaidPayment'
      anyOf:
        - $ref: '#/components/schemas/PaidPayment'
        - $ref: '#/components/schemas/UnpaidPayment'
    Payments:
      description: Payments
      type: array
      minItems: 1
      maxItems: 200
      items:
        $ref: '#/components/schemas/Payment'
    MarginProcedureType:
      description: |
        Margin procedure for used goods (seller pays vat only for margin part of the price).

        | Type | Description |
        | - | - |
        | TOURISM_SERVICES | Tourism services sale. |
        | USED_GOODS | Used goods sale. |
        | WORKS_OF_ART | Works of art sale. |
        | COLLECTIBLES_OR_ANTIQUES | Collectibles or antiques sale. |
      type: string
      format: enum
      enum:
        - TOURISM_SERVICES
        - USED_GOODS
        - WORKS_OF_ART
        - COLLECTIBLES_OR_ANTIQUES
    AbstractTransaction:
      description: Transaction is abstraction over Sale or Order/Arrangement prepayment and any other similar case that contains details about "transaction".
      properties:
        type:
          $ref: '#/components/schemas/TransactionType'
        pricesVatScheme:
          $ref: '#/components/schemas/TransactionPricesVatScheme'
        supplyDate:
          description: Transaction supply date. **ATTENTION!** Optional if `supplyPeriod` is specified or item level `supplyDate` is specified.
          type: string
          format: date
          example: '2022-02-14'
        supplyPeriod:
          description: |
            Transaction supply period eg. for continuous service.
            See: `art. 19a ust. 3 zdanie pierwsze i ust. 4 oraz ust. 5 pkt 4  ustawy o VAT`
          type: string
          format: period
          example: 2022-02-01/2022-02-28
        number:
          $ref: '#/components/schemas/TransactionNumber'
        terms:
          $ref: '#/components/schemas/TransactionTerms'
        currencyCode:
          $ref: '#/components/schemas/CurrencyCode'
        exchangeRate:
          description: Exchange rate (if is constant for entire transaction, if different items have different exchange rates you should set it on item level - `item.exchangeRate`).
          $ref: '#/components/schemas/Rate'
        items:
          type: array
        payments:
          $ref: '#/components/schemas/Payments'
        amount:
          description: Total transaction invoiced amount. For Prepayment/Final Invoices it's amount covered by payment (e.g. totalAmount is `10000` but Prepayment Invoice documents payment of `1000`).
          $ref: '#/components/schemas/MoneyAmount'
        totalAmount:
          description: |
            Total transaction amount. For Prepayment/Final Invoices it's total amount of the transaction (sum of all items amounts (gross)). If not specified it's calculated as sum of all item amounts (gross). 

            **Applies only to Prepayment/Final Invoices.**
          $ref: '#/components/schemas/MoneyAmount'
        receiptFlag:
          description: |
            Should be set if receipt was issued for transaction by fiscal printer (Invoice is issued for transaction already documented by receipt).  
            It's also known as `FP` flag.
          type: boolean
        splitPaymentFlag:
          description: |
            Should be set if product is on list of goods and services obligated to split payment (Annex 15).  
            Also known as `MPP` flag.  
            See: https://jpk.info.pl/jpk-v7/split-payment-lista-towarow-uslug-zalacznik-15/
          type: boolean
        exciseDutyRefundFlag:
          description: Excise duty contained in diesel fuel refund flag for farmers.
          type: boolean
        marginProcedureType:
          $ref: '#/components/schemas/MarginProcedureType'
    PositiveMoneyAmount:
      allOf:
        - exclusiveMinimum: 0
        - $ref: '#/components/schemas/MoneyAmount'
    Quantity:
      type: number
      format: double
      multipleOf: 0.000001
    VatType:
      description: |
        | Type | Description |
        | - | --- |
        | VAT_AMOUNT | Vat amount. It's related to rate (which can be also `0`). | 
        | VAT_EXEMPT | Vat exempt. It can be related to seller (seller is exempted from vat), product (product is exempted from vat eg. insurance). Also documented as `ZW` rate in Poland. | 
        | VAT_FREE | Vat free (not vatable). Vat Free means that it's not related to vat at least (not vatable). For example for some specific transactions the party of transaction which is responsible for vat is **buyer**. Also documented as `NP` rate in Poland. Basing on it the Invoice is marked as `reverse charge` (when buyer is `COMPANY`). |
        | VAT_MARGIN | Vat margin (margin procedure - vat is related to margin only, not the price of goods). |
      type: string
      enum:
        - VAT_AMOUNT
        - VAT_EXEMPT
        - VAT_FREE
        - VAT_MARGIN
    AbstractVat:
      properties:
        type:
          $ref: '#/components/schemas/VatType'
      required:
        - type
    Percentage:
      type: number
      format: double
      minimum: 0
      maximum: 100
      multipleOf: 0.000001
    VatAmount:
      allOf:
        - $ref: '#/components/schemas/AbstractVat'
        - description: |
            Vat amount.  

            It's related to rate (which can be also `0`).
          properties:
            rate:
              description: VAT rate as a percentage.
              $ref: '#/components/schemas/Percentage'
            amount:
              description: The amount of VAT tax due.
              $ref: '#/components/schemas/MoneyAmount'
          required:
            - type
            - rate
            - amount
          example:
            type: VAT_AMOUNT
            rate: 23
            amount: 230
    VatExemptReasonType:
      description: |
        See also: https://ec.europa.eu/taxation_customs/exemptions_pl
        | Type | Description |
        | - | --- |
        | BY_INTERNAL_LAW | By the internal (state) law. See: `art. 43 ust 1 ustawy o VAT, art. 82 ust 3 ustawy o VAT, art. 113 ust 1 i 9 ustawy o VAT`. |
        | BY_UE_DIRECTIVE | Due to the provisions of a UE Directive. See: `2006/112/WE` |
        | OTHER | By any other legal reason, as specified in the description. | 
      type: string
      format: enum
      enum:
        - BY_INTERNAL_LAW
        - BY_UE_DIRECTIVE
        - OTHER
    VatExemptReason:
      description: |
        VAT exemption details.
      properties:
        type:
          $ref: '#/components/schemas/VatExemptReasonType'
        description:
          description: The description of VAT exemption reason (if required) - usually a reference to specific legal provisions.
          type: string
          minLength: 1
          maxLength: 256
      required:
        - type
      example:
        type: BY_INTERNAL_LAW
        description: art. 13a ust. 15zxc pkt 75 ustawy o podatku od towarów i usług
    VatExempt:
      allOf:
        - $ref: '#/components/schemas/AbstractVat'
        - description: |
            VAT Exempt.  

            Vat exempt. It can be related to seller (seller is exempted from vat), product (product is exempted from vat eg. insurance).

            Also documented as ZW rate in Poland.
          properties:
            type:
              const: VAT_EXEMPT
            reason:
              description: |
                Exempt reason. In most cases it's required. (they are only few situations when you don't have to provide reason, mostly its required)  
                Optional only for several cases like `financial services` or `insurance services` etc.  
                See: `art. 43 ust. 1 pkt 7, pkt 37-41 ustawy o VAT`
              $ref: '#/components/schemas/VatExemptReason'
          required:
            - type
            - reason
    VatFree:
      allOf:
        - $ref: '#/components/schemas/AbstractVat'
        - description: |
            Vat free (not vatable).  

            Vat Free means that it's not related to vat at least (not vatable). 

            For example for some specific transactions the party of transaction which is responsible for vat is buyer. 

            Also documented as NP rate in Poland. Basing on it the Invoice is marked as reverse charge (when buyer is COMPANY).
          properties:
            type:
              const: VAT_FREE
          required:
            - type
    VatMargin:
      allOf:
        - $ref: '#/components/schemas/AbstractVat'
        - description: |
            Vat margin (margin procedure - vat is related to margin only, not the price of goods).
          properties:
            type:
              const: VAT_MARGIN
          required:
            - type
    Vat:
      properties:
        type:
          $ref: '#/components/schemas/VatType'
      required:
        - type
      discriminator:
        propertyName: type
        mapping:
          VAT_AMOUNT: '#/components/schemas/VatAmount'
          VAT_EXEMPT: '#/components/schemas/VatExempt'
          VAT_FREE: '#/components/schemas/VatFree'
          VAT_MARGIN: '#/components/schemas/VatMargin'
      anyOf:
        - $ref: '#/components/schemas/VatAmount'
        - $ref: '#/components/schemas/VatExempt'
        - $ref: '#/components/schemas/VatFree'
        - $ref: '#/components/schemas/VatMargin'
    GTUCode:
      description: |
        GTU Codes. See: https://jpk.info.pl/jpk-v7/gtu-oznaczenie-grupowanie-towaru-uslug-plik-jpk-v7m-jpkv7k/

        <details>
        <summary>Show codes</summary>

        | Code | Description |
        | - | -- |
        | GTU_01 | Delivery of alcoholic beverages within the meaning of the provisions on excise duty (not applicable to catering). |
        | GTU_02 | Delivery of goods referred to in `art. 103 ust. 5aa  ustawy o VAT` (including fuels and diesel oils). It's mostly about any kind of fuels. |
        | GTU_03 | Delivery of heating oil. |
        | GTU_04 | Supply of tobacco products. |
        | GTU_05 | Delivery of waste. |
        | GTU_06 | Delivery of electronic devices. |
        | GTU_07 | Delivery of vehicles and car parts. |
        | GTU_08 | Delivery of precious and non-precious metals. |
        | GTU_09 | Delivery of medicines and medical devices. |
        | GTU_10 | Delivery of buildings, structures and land. |
        | GTU_11 | Provision of services for the transfer of greenhouse gas emission allowances. |
        | GTU_12 | Provision of intangible services, e.g. consulting, accounting, legal, management, training, marketing. |
        | GTU_13 | Provision of transport and warehouse management services. |
        </details>
      type: string
      format: enum
      enum:
        - GTU_01
        - GTU_02
        - GTU_03
        - GTU_04
        - GTU_05
        - GTU_06
        - GTU_07
        - GTU_08
        - GTU_09
        - GTU_10
        - GTU_11
        - GTU_12
        - GTU_13
    TransactionItem:
      description: Transaction item (good or service).
      properties:
        number:
          description: Sequenced next item number starting from 1.
          type: integer
          minimum: 1
        id:
          description: Universal unique **item** id.
          type: string
          minLength: 1
          maxLength: 40
        productCode:
          description: Internal product code (from sale system).
          type: string
          minLength: 1
          maxLength: 50
        supplyDate:
          description: |
            Supply date is the date when VAT becomes accountable. 
            Required when different items has different `supplyDate`.
          type: string
          format: date
          example: '2022-02-14'
        supplyPeriod:
          description: |
            Supply period eg. for continuous service.
            See: `art. 19a ust. 3 zdanie pierwsze i ust. 4 oraz ust. 5 pkt 4 ustawy o VAT`
          type: string
          format: period
          example: 2022-02-01/2022-02-28
        name:
          description: |
            Name of good or service.

            ⚠️ <span style="color:red">**For FA(2) it's truncated to 256 characters.**</span>
          type: string
          minLength: 1
          maxLength: 512
        price:
          description: Unit price (vat inclusive or exclusive depends on transaction `pricesVatScheme` - i.e. net unit price for `VAT_EXCLUSIVE`, gross unit price for `VAT_INCLUSIVE`).
          $ref: '#/components/schemas/PositiveMoneyAmount'
        discount:
          description: Discount to apply on price (only if price was not reduced already).
          $ref: '#/components/schemas/MoneyAmount'
        quantity:
          description: Quantity
          $ref: '#/components/schemas/Quantity'
        unitOfMeasure:
          description: Unit of measure.
          type: string
        amount:
          description: Total item amount ((price - discount) * quantity).
          $ref: '#/components/schemas/PositiveMoneyAmount'
        vat:
          description: VAT tax information.
          $ref: '#/components/schemas/Vat'
        exciseDutyAmount:
          description: Excise duty.
          $ref: '#/components/schemas/PositiveMoneyAmount'
        exchangeRate:
          description: |
            Exchange rate (if transaction currency is not national - `PLN`).

            ATTENTION! For Prepayment Invoice it has to be set at Transaction level (you can't use exchangeRate at item level).
          $ref: '#/components/schemas/Rate'
        gtin:
          description: |
            Global Trade Item Number.
            See: https://en.wikipedia.org/wiki/Global_Trade_Item_Number
          type: string
          minLength: 1
          maxLength: 20
        pkwiu:
          description: |
            Polish Classification of Goods and Services.  
            See: http://www.klasyfikacje.gofin.pl/wybor-pkwiu.html
          type: string
          minLength: 1
          maxLength: 50
        cn:
          description: |
            Combined nomenclature.  
            See: http://www.klasyfikacje.gofin.pl/wybor-cn.html
          type: string
          minLength: 1
          maxLength: 50
        pkob:
          description: |
            Polish Classification of Construction Objects.  
            See: http://www.klasyfikacje.gofin.pl/pkob/8,0.html
          type: string
          minLength: 1
          maxLength: 50
        gtu:
          $ref: '#/components/schemas/GTUCode'
        splitPaymentFlag:
          description: |
            Should be set if product is on list of goods and services obligated to split payment (Annex 15).  
            Also known as `MPP` flag.  
            See: https://jpk.info.pl/jpk-v7/split-payment-lista-towarow-uslug-zalacznik-15/
          type: boolean
        spvIssueFlag:
          description: |
            Should be set if product is single purpose voucher issue.  
            Also known as `B_SPV` flag.
          type: boolean
        spvSupplyFlag:
          description: |
            Should be set if product is representing act of supplying single purpose voucher.  
            Also known as `B_SPV_DOSTAWA` flag.
          type: boolean
        mpvFeeFlag:
          description: |
            Should be set if product is representing act of accounting fee for multi purpose voucher by intermediary.  
            Also known as `B_MPV_PROWIZJA` flag.
          type: boolean
        importFlag:
          description: |
            Should be set if product was imported from extra-Community and sold in intra-Community transaction.  
            Also known as `I_42` flag.
          type: boolean
        reimportFlag:
          description: |
            Should be set if product was imported from extra-Community and send to another extra-Community country in which has been changed (e.g. improved/assembled/modified/repaired etc)  
            and after that send back and sold in intra-Community transaction.  
            Also known as `I_63` flag.
          type: boolean
        intermediaryPartySimplifiedProcedureFlag:
          description: |
            Should be set if product is sold by second party in simplified tripartite transaction.  
            Also known as `TT_D` flag.  
            See: `art. 22 ust. 2d ustawy o VAT`.
          type: boolean
        additionalInformation:
          description: Additional information.
          maxProperties: 100
          propertyNames:
            minLength: 1
            maxLength: 240
          additionalProperties:
            type: string
            minLength: 1
            maxLength: 240
      required:
        - number
        - name
        - price
        - quantity
        - unitOfMeasure
        - amount
        - vat
    TransactionItems:
      type: array
      minItems: 1
      maxItems: 10000
      items:
        $ref: '#/components/schemas/TransactionItem'
    Transaction:
      allOf:
        - $ref: '#/components/schemas/AbstractTransaction'
        - properties:
            items:
              $ref: '#/components/schemas/TransactionItems'
        - required:
            - type
            - pricesVatScheme
            - currencyCode
            - items
            - amount
    VatSubtotalsAmount:
      allOf:
        - properties:
            type:
              description: |
                | Type | Description |
                | - | --- |
                | VAT_AMOUNT | Vat amount. It's related to rate (which can be also `0`). |
              const: VAT_AMOUNT
            rate:
              description: VAT rate as a percentage.
              $ref: '#/components/schemas/Percentage'
            amount:
              description: The amount of VAT tax due.
              $ref: '#/components/schemas/MoneyAmount'
          required:
            - type
            - rate
            - amount
          example:
            type: VAT_AMOUNT
            rate: 23
            amount: 230
    VatSubtotal:
      description: Vat subtotals for different VAT rates.
      properties:
        exclusiveAmount:
          description: Total VAT exclusive (net) amount taxed at a specific VAT rate.
          $ref: '#/components/schemas/MoneyAmount'
        amount:
          description: Total VAT amount at a specific VAT rate.
          $ref: '#/components/schemas/VatSubtotalsAmount'
        convertedVatAmount:
          description: Vat amount converted to local currency (if transaction currency is not National - `PLN`).
          $ref: '#/components/schemas/MoneyAmount'
        inclusiveAmount:
          description: Total vat inclusive (gross) amount at vat rate.
          $ref: '#/components/schemas/MoneyAmount'
      required:
        - exclusiveAmount
        - amount
        - inclusiveAmount
      example:
        exclusiveAmount: 1000
        amount:
          rate: 23
          amount: 230
        inclusiveAmount: 1230
    VatSubtotals:
      description: |
        Vat Subtotals. Required only for type VAT_AMOUNT otherwise empty array.

        ⚠️ <span style="color:red">**The list contains only values for numeric VAT rates (e.g. 0%, 7%, 23%). For exempt/free amounts, please use the exemptAmount and freeAmount fields.**</span>
      type: array
      items:
        $ref: '#/components/schemas/VatSubtotal'
    VatTotal:
      description: Vat total.
      properties:
        subtotals:
          $ref: '#/components/schemas/VatSubtotals'
        exemptAmount:
          description: Total vat exempt amount (amount that is exempt from vat by some reason).
          $ref: '#/components/schemas/MoneyAmount'
        freeAmount:
          description: Total vat free amount (not vatable, not subject to vat).
          $ref: '#/components/schemas/MoneyAmount'
        marginAmount:
          description: |
            Total vat margin amount (VAT related to products sold in margin procedure).
          $ref: '#/components/schemas/MoneyAmount'
        exclusiveAmount:
          description: |
            Sum of `subtotals.exclusiveAmount`

            ⚠️ <span style="color:red">**Exempt and free amounts should NOT be included in this value. You can send them via the exemptAmount / freeAmount fields.**</span>
          $ref: '#/components/schemas/MoneyAmount'
        amount:
          description: Total vat amount (sum of all `subtotals.amount`).
          $ref: '#/components/schemas/MoneyAmount'
        convertedAmount:
          description: Vat amount converted to local currency (if transaction currency is not National - `PLN`, sum of `subtotals.convertedAmount`).
          $ref: '#/components/schemas/MoneyAmount'
        inclusiveAmount:
          description: |
            Sum of `subtotals.inclusiveAmount`

            ⚠️ <span style="color:red">**Exempt and free amounts should NOT be included in this value. You can send them via the exemptAmount / freeAmount fields.**</span>
          $ref: '#/components/schemas/MoneyAmount'
      required:
        - subtotals
        - exemptAmount
        - freeAmount
        - exclusiveAmount
        - amount
        - inclusiveAmount
      example:
        subtotals:
          - exclusiveAmount: 1000
            amount:
              rate: 23
              amount: 230
            inclusiveAmount: 1230
          - exclusiveAmount: 2000
            amount:
              rate: 8
              amount: 160
            inclusiveAmount: 2160
          - exclusiveAmount: 4000
            amount:
              rate: 0
              amount: 0
            inclusiveAmount: 4000
        exemptAmount: 5000
        freeAmount: 3000
        marginAmount: 0
        exclusiveAmount: 7000
        amount: 390
        inclusiveAmount: 7390
    FullIdentity:
      description: Represents Identity that has to have taxId and name (mostly every kind of Identity except private individuals).
      properties:
        taxId:
          $ref: '#/components/schemas/Identifier'
        name:
          $ref: '#/components/schemas/Name'
      required:
        - taxId
        - name
    AbstractRegon:
      description: |
        REGON is number which identifies Subject in Polish 'National Business Registry Number'.  
        See: https://wyszukiwarkaregon.stat.gov.pl/appBIR/index.aspx
      type: string
    Regon9Digits:
      allOf:
        - $ref: '#/components/schemas/AbstractRegon'
        - minLength: 9
          maxLength: 9
    Regon14Digits:
      allOf:
        - $ref: '#/components/schemas/AbstractRegon'
        - minLength: 14
          maxLength: 14
    Regon:
      anyOf:
        - $ref: '#/components/schemas/Regon9Digits'
        - $ref: '#/components/schemas/Regon14Digits'
    TaxablePersonStatus:
      description: |
        Taxable person status
        | Status | Description |
        | - | -- |
        | IN_LIQUIDATION | An invoice documenting the sale by a taxpayer in liquidation. |
        | IN_RESTRUCTURING | An invoice documenting a sale by a taxpayer that is under restructuring. |
        | IN_BANKRUPTCY | An invoice documenting the sale by a taxpayer in bankruptcy. |
        | BY_COMPANY_INHERITANCE | An invoice documenting the sale made by the company inheritance. |
      type: string
      format: enum
      enum:
        - IN_LIQUIDATION
        - IN_RESTRUCTURING
        - IN_BANKRUPTCY
        - BY_COMPANY_INHERITANCE
    ContactType:
      description: |
        | Type | Description |
        | - | --- |
        | EMAIL | Contact via email. |
        | PHONE_NUMBER | Contact via phone number. |
      type: string
      format: enum
      enum:
        - EMAIL
        - PHONE_NUMBER
    AbstractContact:
      properties:
        type:
          $ref: '#/components/schemas/ContactType'
      required:
        - type
    EmailContact:
      allOf:
        - $ref: '#/components/schemas/AbstractContact'
        - properties:
            email:
              type: string
              format: email
              minLength: 1
              maxLength: 255
              pattern: (.)+@(.)+
          required:
            - email
    PhoneNumberContact:
      allOf:
        - $ref: '#/components/schemas/AbstractContact'
        - properties:
            phoneNumber:
              type: string
              minLength: 1
              maxLength: 16
          required:
            - phoneNumber
    Contact:
      description: Contact by type.
      properties:
        type:
          $ref: '#/components/schemas/ContactType'
      required:
        - type
      discriminator:
        propertyName: type
        mapping:
          EMAIL: '#/components/schemas/EmailContact'
          PHONE_NUMBER: '#/components/schemas/PhoneNumberContact'
      anyOf:
        - $ref: '#/components/schemas/EmailContact'
        - $ref: '#/components/schemas/PhoneNumberContact'
    AbstractParty:
      properties:
        EORI:
          description: Economic Operators' Registration and Identification.
          type: string
          minLength: 1
          maxLength: 256
        contact:
          type: array
          maxItems: 3
          items:
            $ref: '#/components/schemas/Contact'
    SupplierParty:
      description: Supplier of goods or services (seller). Have to be **Company** identity.
      allOf:
        - properties:
            identity:
              description: Supplier (seller) identity.
              $ref: '#/components/schemas/FullIdentity'
            address:
              $ref: '#/components/schemas/Address'
            correspondenceAddress:
              $ref: '#/components/schemas/Address'
            bdo:
              description: |
                BDO is number which identifies Subject in Polish 'Waste Database'.  
                See: https://bdo.mos.gov.pl/
              type: string
              minLength: 9
              maxLength: 9
            regon:
              $ref: '#/components/schemas/Regon'
            krs:
              description: |
                KRS is number which identifies Subject in Polish 'National Court Registry'.  
                See: https://ekrs.ms.gov.pl/
              type: string
              minLength: 10
              maxLength: 10
            status:
              $ref: '#/components/schemas/TaxablePersonStatus'
            cashAccountingSchemeFlag:
              description: |
                This flag should be set if taxpayer is using cash accounting scheme.  
                Cash accounting scheme allows eligible businesses to account for VAT on the basis of payments received and made.  
                It's also known as `MK` flag.  
                See: `art. 19a ust. 5 pkt 1 lub art. 21 ust. 1`.
              type: boolean
            additionalInformation:
              description: Additional information/comments.
              type: array
              maxItems: 3
              items:
                description: Additional information.
                type: string
                minLength: 1
                maxLength: 3500
          required:
            - identity
            - address
        - $ref: '#/components/schemas/AbstractParty'
    FullCustomerParty:
      description: Customer of goods or services (Buyer).
      allOf:
        - properties:
            identity:
              description: Customer (buyer) identity.
              $ref: '#/components/schemas/NamedIdentity'
            address:
              $ref: '#/components/schemas/Address'
            correspondenceAddress:
              $ref: '#/components/schemas/Address'
            customerId:
              description: Customer id should be specified if it appears on order/contract.
              type: string
              minLength: 1
              maxLength: 256
          required:
            - identity
            - address
        - $ref: '#/components/schemas/AbstractParty'
    IdentifiedIdentity:
      description: Represents Identity that has to have taxId (mostly every kind of Identity except private individuals).
      properties:
        taxId:
          $ref: '#/components/schemas/Identifier'
        name:
          $ref: '#/components/schemas/Name'
      required:
        - taxId
    SimplifiedCustomerParty:
      description: Simple customer of goods or services or just buyers. Have to be **taxable person** so taxable identity is expected.
      allOf:
        - properties:
            identity:
              description: Customer (buyer) identity.
              $ref: '#/components/schemas/IdentifiedIdentity'
            address:
              $ref: '#/components/schemas/Address'
            correspondenceAddress:
              $ref: '#/components/schemas/Address'
            customerId:
              description: Customer id should be specified if it appears on order/contract.
              type: string
              minLength: 1
              maxLength: 256
          required:
            - identity
        - $ref: '#/components/schemas/AbstractParty'
    CustomerParty:
      anyOf:
        - $ref: '#/components/schemas/FullCustomerParty'
        - $ref: '#/components/schemas/SimplifiedCustomerParty'
    Identity:
      description: |
        Identity represents any company, private person, sole proprietorship, local government unit etc.

        For some cases (like Simplified Invoice) `name` can be optional. In other side there are some cases when `taxId` is optional (like Invoice for Embassy (embasses may not have taxId) or Private Individual).
      anyOf:
        - $ref: '#/components/schemas/FullIdentity'
        - $ref: '#/components/schemas/IdentifiedIdentity'
        - $ref: '#/components/schemas/NamedIdentity'
    Party:
      allOf:
        - $ref: '#/components/schemas/AbstractParty'
        - properties:
            EORI:
              description: Economic Operators' Registration and Identification.
              type: string
            identity:
              $ref: '#/components/schemas/Identity'
            address:
              description: |
                Party address.

                ⚠️ <span style="color:red">**For FA(2) it's required.**</span>
              $ref: '#/components/schemas/Address'
            correspondenceAddress:
              $ref: '#/components/schemas/Address'
          required:
            - identity
    AdditionalCustomerParty:
      allOf:
        - properties:
            percentageShare:
              description: |
                Share - The percentage share of an additional buyer. 
                The share of the buyer named in the Podmiot2 section is then the supplementing up to 100% of the sum of shares of additional buyers. 
                If the field is left blank, it is assumed that the shares of the buyers appearing in the invoice are equal
              $ref: '#/components/schemas/Percentage'
        - $ref: '#/components/schemas/FullCustomerParty'
    OtherParty:
      allOf:
        - $ref: '#/components/schemas/Party'
        - properties:
            description:
              description: Description of other third party role.
              type: string
          required:
            - description
    ThirdParties:
      description: Third parties.
      properties:
        factor:
          description: Invoice factor party.
          $ref: '#/components/schemas/Party'
        recipient:
          description: Invoice recipient party.
          $ref: '#/components/schemas/Party'
        primarySeller:
          description: |
            Primary seller. Most often there is no need to send this structure. 
            It's designed only for very unusual situations (after Subject transformations/acquisitions etc.). 
            For most common cases this property can be ignored.
          $ref: '#/components/schemas/Party'
        additionalBuyers:
          description: Additional customers party.
          type: array
          items:
            $ref: '#/components/schemas/AdditionalCustomerParty'
        issuer:
          description: Invoice issuer party.
          $ref: '#/components/schemas/Party'
        payer:
          description: Invoice payer party.
          $ref: '#/components/schemas/Party'
        localGovernmentUnitRecipient:
          description: Invoice local government recipient party in case of using permissions model designed for local government units and VAT groups.
          $ref: '#/components/schemas/Party'
        localGovernmentUnitIssuer:
          description: Invoice local government issuer party in case of using permissions model designed for local government units and VAT groups.
          $ref: '#/components/schemas/Party'
        vatGroupMemberRecipient:
          description: Invoice VAT group recipient party in case of using permissions model designed for local government units and VAT groups.
          $ref: '#/components/schemas/Party'
        vatGroupMemberIssuer:
          description: Invoice VAT group issuer party in case of using permissions model designed for local government units and VAT groups.
          $ref: '#/components/schemas/Party'
        employee:
          description: |
            Invoice employee party.

            ⚠️ <span style="color:red">**Only applicable for FA(3). For FA(2) it's ignored.**</span>
          $ref: '#/components/schemas/Party'
        others:
          type: array
          items:
            $ref: '#/components/schemas/OtherParty'
    EmpoweredPartyRole:
      description: |
        Role of empowered party.
      type: string
      format: enum
      enum:
        - EXECUTIVE_ORGAN
        - COUNTY_COURT_BAILIFF
        - TAX_REPRESENTATIVE
    EmpoweredParty:
      description: Empowered party.
      allOf:
        - $ref: '#/components/schemas/Party'
        - properties:
            role:
              $ref: '#/components/schemas/EmpoweredPartyRole'
          required:
            - role
    InvoiceSettlement:
      description: Settlements.
      properties:
        deductions:
          type: array
          description: Amounts **subtracted** from the transaction amount, with a specified reason for said subtraction.
          maxItems: 100
          items:
            properties:
              amount:
                description: Deduction amount.
                $ref: '#/components/schemas/MoneyAmount'
              reason:
                description: Reason for the deduction.
                type: string
                minLength: 1
                maxLength: 256
        deductionAmount:
          description: Deductions total amount.
          $ref: '#/components/schemas/MoneyAmount'
        additions:
          type: array
          description: Additional amounts **added** to the transaction amount, with a specified reason for said addition.
          maxItems: 100
          items:
            properties:
              amount:
                description: Addition total amount.
                $ref: '#/components/schemas/MoneyAmount'
              reason:
                description: Reason for the addition.
                type: string
                minLength: 1
                maxLength: 256
        additionAmount:
          description: Additions amount.
          $ref: '#/components/schemas/MoneyAmount'
    KeyValueMetadata:
      type: object
      description: Key-value metadata pairs
      maxProperties: 1000
      propertyNames:
        minLength: 1
        maxLength: 256
      additionalProperties:
        type: string
        minLength: 1
        maxLength: 256
      example:
        Document type: Invoice supplement
        Processing date: '2025-01-15'
    ColumnDefinition:
      type: object
      required:
        - content
        - type
      properties:
        content:
