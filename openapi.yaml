  /invoices/{invoiceId}/assignment:
    put:
      security:
        - OAuth2ClientCredentials-Staging: []
        - OAuth2ClientCredentials-Prod: []
        - OAuth2AuthorizationCodeWithPKCE-Staging:
            - user_impersonation
        - OAuth2AuthorizationCodeWithPKCE-Prod:
            - user_impersonation
      parameters:
        - $ref: '#/components/parameters/invoiceId'
      tags:
        - Invoices assignment
      summary: Set invoice assignment manually.
      description: |
        Manually set the assignment of an invoice, overriding any previous assignment result from the classification engine.

        Use this endpoint to manually assign an invoice to a destination system (`ASSIGNED`), mark it as having no matching destination (`UNASSIGNED`), or reject it entirely (`REJECTED`).

        When `status` is `ASSIGNED`, the `destinationId` field is required.
      operationId: putInvoiceAssignment
      requestBody:
        $ref: '#/components/requestBodies/InvoiceAssignmentRequest'
      responses:
        '200':
          description: Invoice assignment has been updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceMinimalProjection'
        '400':
          $ref: '#/components/responses/IncorrectStructureResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
