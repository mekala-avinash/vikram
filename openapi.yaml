              description: |
                Other identifier (e.g. in United States EIN).
              type: string
              minLength: 1
              maxLength: 50
              examples:
                - 5B7B1V.00042.ME.616
          required:
            - type
            - other
            - countryCode
          example:
            type: OTHER
            other: 5B7B1V.00042.ME.616
    InternalIdentifier:
      description: |
        KSeF internal identifier.

        ⚠️ <span style="color:red">**Only applicable for `vatGroupMemberRecipient` and `localGovernmentUnitRecipient`.**</span>
      allOf:
        - $ref: '#/components/schemas/AbstractIdentifier'
        - properties:
            type:
              const: INTERNAL
            internal:
              description: |
                KSeF internal identifier. NIP-5 digits. e.g. `5252535950-00001`
              type: string
              example: '5252535950'
              pattern: '[1-9]((\d[1-9])|([1-9]\d))\d{7}-\d{5}'
          required:
            - type
            - internal
          example:
            type: INTERNAL
            internal: 5252535950-00001
    Identifier:
      description: Identity tax identifier.
      properties:
        type:
          $ref: '#/components/schemas/IdentifierType'
      required:
        - type
      discriminator:
        propertyName: type
