                      echo "✓ Zip deploy complete"

                - task: AzureCLI@2
                  displayName: 'Set App Settings'
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      SETTINGS_ARGS=()
                      while IFS= read -r line; do
                        SETTINGS_ARGS+=("$line")
                      done < <(jq -r '
