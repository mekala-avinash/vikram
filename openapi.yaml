    MoneyAmount:
      type: number
      format: double
      multipleOf: 0.01
      example: 123.23
    Previews:
      description: |
        URLs to anonymous previews of the invoice.
      allOf:
        - properties:
            smartKsef:
              type: string
              minLength: 1
              maxLength: 256
              description: Web address to be presented on the invoice in form of QR code, directing to the SmartKSeF anonymous preview of this invoice. To be used if official QR code can't be obtain, ie 'previews.ksef' field is empty. The lack of KSeF id and official QR code blocks printing a VAT invoice so the name 'Sales Document' should be used instead of 'VAT invoice' (VAT invoice printout is reserved for documents officialy issued).
            ksef:
              type: string
              minLength: 1
              maxLength: 256
              description: Web address to be presented on the invoice in form of QR code, directing to tax authorities gov.pl page which confirms the correctness of the invoice. If 'previews.ksef' is provided then it should be printed on the invoice in form of QR code, if 'previews.ksef' field is empty then QR code from 'previews.smartksef' (which is always provided) should be used.
          required:
            - smartKsef
    InvoiceVerificationCodes:
      description: |
        Invoice verification codes.

        Depends on `X-KSEF-REGISTRATION-MODE` (ONLINE/OFFLINE).

        Depends on `X-KSEF-OPTIONS=TRANSACTION-CONFIRMATION`
      properties:
        online:
          description: |
            Invoice online code (Invoice verification url which should be presented on Invoice as QR Code or passed to customer within the Invoice if presenting QR Code is not possible) for online registration.
          type: string
          maxLength: 256
          example: https://ksef-test.mf.gov.pl/client-app/invoice/5252535950/14-11-2025/rf2lpklYMDWmlg3GTcoymIBr-qrET-CdI3b1_-TEyPA
        offline:
          description: |
            Invoice offline code (Invoice verificaiton url which should be presented on Invoice as QR Code or passed to customer within the Invoice if presenting QR Code is not possible) for offline registration.

            This code is generated only if one of the following conditions is met:

            - `X-KSEF-REGISTRATION-MODE` is set to OFFLINE.
            - `X-KSEF-OPTIONS=TRANSACTION-CONFIRMATION` is set.
          type: string
          maxLength: 256
          example: https://ksef-test.mf.gov.pl/client-app/invoice/5252535950/14-11-2025/rf2lpklYMDWmlg3GTcoymIBr-qrET-CdI3b1_-TEyPA
        certificate:
          description: |
            Certificate code (Certificate verification url which should be presented on Invoice as QR Code or passed to customer within the Invoice if presenting QR Code is not possible) for offline registration.

            This code is generated only if one of the following conditions is met:

            - `X-KSEF-REGISTRATION-MODE` is set to OFFLINE.
            - `X-KSEF-OPTIONS=TRANSACTION-CONFIRMATION` is set.
          type: string
          maxLength: 1024
          example: https://ksef-test.mf.gov.pl/client-app/certificate/Nip/5252535950/5252535950/01F304712DD00DB3/rf2lpklYMDWmlg3GTcoymIBr-qrET-CdI3b1_-TEyPA/Gx2MUEc0vmIXXa0ui3JDiL0nKi8_CFgUcdGajUH1Uwyytv4qEGhOPufcrzzD6CSZbqPOo85sMnX23HeHIaUQUmapsrCfJYPQ9KjZrGmk4Z83BozrjMpLyBF0YsPTTUufZPFZBdYQplP5PY7Kx2m8mbp5hqdNkC0VfI8cyHrig85JIv18F0XjzNCUN1D1yVEB5U8CNAXb1LiT4a6__5dL7neaSSgNq8Nd-YACh6UUFXGVKYnN_ECvQQSK2F8o6B7Fs8t5QyXtYU2laY6QBdh5_QecQIOg_qRQUUO04v2Qj-4MO3f7I1COegd4BHhKbkt-8wBOhPf90LuoFAJ6DzF6Kg
      example:
        online: https://ksef-test.mf.gov.pl/client-app/invoice/5252535950/14-11-2025/rf2lpklYMDWmlg3GTcoymIBr-qrET-CdI3b1_-TEyPA
        offline: https://ksef-test.mf.gov.pl/client-app/invoice/5252535950/14-11-2025/rf2lpklYMDWmlg3GTcoymIBr-qrET-CdI3b1_-TEyPA
        certificate: https://ksef-test.mf.gov.pl/client-app/certificate/Nip/5252535950/5252535950/01F304712DD00DB3/rf2lpklYMDWmlg3GTcoymIBr-qrET-CdI3b1_-TEyPA/Gx2MUEc0vmIXXa0ui3JDiL0nKi8_CFgUcdGajUH1Uwyytv4qEGhOPufcrzzD6CSZbqPOo85sMnX23HeHIaUQUmapsrCfJYPQ9KjZrGmk4Z83BozrjMpLyBF0YsPTTUufZPFZBdYQplP5PY7Kx2m8mbp5hqdNkC0VfI8cyHrig85JIv18F0XjzNCUN1D1yVEB5U8CNAXb1LiT4a6__5dL7neaSSgNq8Nd-YACh6UUFXGVKYnN_ECvQQSK2F8o6B7Fs8t5QyXtYU2laY6QBdh5_QecQIOg_qRQUUO04v2Qj-4MO3f7I1COegd4BHhKbkt-8wBOhPf90LuoFAJ6DzF6Kg
    InvoiceAssignmentStatus:
      description: |
        Invoice assignment status.
        - `ASSIGNED`: Invoice has been ASSIGNED to destination (by classification engine or by manual action).
        - `UNASSIGNED`: Invoice has been marked as UNASSIGNED (e.g., classification engine resulted with no match and is waiting for manual assignment).
        - `REJECTED`: Invoice has been marked as REJECTED (does not match any destination and should not be processed anymore).
      type: string
      format: enum
      enum:
        - ASSIGNED
        - UNASSIGNED
        - REJECTED
    InvoiceAssignmentType:
      description: |
        Invoice assignment status.
        - `AUTOMATIC`: Invoice assignment has been evaluated by classification engine.
        - `MANUAL`: Invoice assignment has been done manually.
      type: string
      format: enum
      enum:
        - AUTOMATIC
        - MANUAL
    InvoiceAssignment:
      description: |
        Invoice assignment. It's filled as part of the classification module that process Invoices, evaluate against defined rules and as the result assigns 
        Invoice to destination (the `ASSIGNED` status) or mark Invoice as `UNASSIGNED` and then `REJECTED` (manually by user).
      type: object
      properties:
        status:
          $ref: '#/components/schemas/InvoiceAssignmentStatus'
        type:
          $ref: '#/components/schemas/InvoiceAssignmentType'
        description:
          type: string
          description: |
            Description of the assignment. 

            For assigned invoices, it contains the classification rules evaluation.

            For rejected invoices, it contains the reason for rejection.
          maxLength: 4096
        destinationId:
          type: string
          format: uuid
          description: Unique identifier of the external system where the invoice is assigned.
          minLength: 36
          maxLength: 36
        triggeredBy:
          type: string
          format: uuid
          description: Unique identifier of the user that triggered the assignment or classificationId if the assignment has been evaluated using classification engine.
          minLength: 36
          maxLength: 36
        triggeredAt:
          type: string
          format: date-time
          description: Timestamp when the assignment was evaluated.
      required:
        - status
        - type
        - triggeredBy
        - triggeredAt
    SimpleKsefState:
      description: |
        KSeF state at the moment of the invoice's acceptance into SmartKSeF.
      type: string
      enum:
        - AVAILABLE
        - NORMAL_DISRUPTION
        - COMPLETE_DISRUPTION
        - PLANNED_DISRUPTION
    InvoiceMinimalProjection:
      description: Vat/Corrective Invoice minimal projection.
      properties:
        id:
          $ref: '#/components/schemas/InvoiceId'
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        type:
          anyOf:
            - $ref: '#/components/schemas/VatInvoiceType'
            - $ref: '#/components/schemas/CorrectiveInvoiceType'
        issueDate:
          description: Vat Invoice issue date.
          type: string
          format: date
          example: '2022-02-14'
        issuePlace:
          description: Vat Invoice issue place.
          type: string
          minLength: 1
          maxLength: 256
          example: Gliwice
        submissionDateTime:
          description: Invoice sent to KSeF date-time (based on KSeF's data)
          type: string
          format: date-time
          example: '2022-08-25T07:59:57Z'
        ksefId:
          $ref: '#/components/schemas/InvoiceKsefId'
        registrationDateTime:
          description: Invoice registration date-time (based on KSeF's data)
          type: string
          format: date-time
          example: '2022-08-25T08:00:00Z'
        createdAt:
          description: Invoice created date-time in SmartKsef
          type: string
          format: date-time
          example: '2022-08-25T08:00:00Z'
        rejection:
          $ref: '#/components/schemas/Rejection'
        number:
          $ref: '#/components/schemas/InvoiceNumber'
        source:
          description: Source system label
          type: string
          minLength: 1
          maxLength: 256
        sellerName:
          description: Seller name
          type: string
          minLength: 1
          maxLength: 256
        sellerTaxId:
          description: Seller tax ID
          type: string
          minLength: 1
          maxLength: 256
        buyerName:
          description: Buyer name
          type: string
          minLength: 1
          maxLength: 256
        buyerTaxId:
          description: Buyer tax ID
          type: string
          minLength: 1
          maxLength: 256
        thirdParties:
          $ref: '#/components/schemas/ThirdPartiesMinimalProjection'
        currency:
          $ref: '#/components/schemas/CurrencyCode'
        netAmount:
          $ref: '#/components/schemas/MoneyAmount'
        vatAmount:
          $ref: '#/components/schemas/MoneyAmount'
        grossAmount:
          $ref: '#/components/schemas/MoneyAmount'
        upoId:
          type: string
          format: uuid
        confirmationDateTime:
          description: Invoice confirmation (UPO) date-time (based on KSeF's data)
          type: string
          format: date-time
          example: '2022-08-25T08:00:00Z'
        attachmentIds:
          type: array
          items:
            type: string
            format: uuid
        previews:
          $ref: '#/components/schemas/Previews'
        verificationCodes:
          $ref: '#/components/schemas/InvoiceVerificationCodes'
        assignment:
          $ref: '#/components/schemas/InvoiceAssignment'
        ksefState:
          $ref: '#/components/schemas/SimpleKsefState'
      required:
        - id
        - status
        - type
        - issueDate
        - number
        - sellerName
        - sellerTaxId
        - currency
        - netAmount
        - grossAmount
        - vatAmount
    InvoiceMinimalProjections:
      type: array
      items:
        $ref: '#/components/schemas/InvoiceMinimalProjection'
    AbstractError:
      type: object
      additionalProperties: true
      description: |
        The Problem Details JSON Object [[RFC7807](https://tools.ietf.org/html/rfc7807)]. In our implementation `type` is required field.
      properties:
        type:
          type: string
          description: |
            A URI reference [[RFC3986](https://tools.ietf.org/html/rfc3986)] that identifies the problem type.
            It should provide human-readable documentation for the problem type.
          format: uri
        title:
          type: string
          description: |
            A short, human-readable summary of the problem type.
            It SHOULD NOT change from occurrence to occurrence of the problem, except for purposes of localization.
        status:
          type: integer
          description: The HTTP status code.
        detail:
          type: string
          description: |
            A human-readable explanation specific to this
            occurrence of the problem.
        instance:
          type: string
          description: |
            A URI reference that identifies the specific
            occurrence of the problem.  It may or may not yield further
            information if dereferenced.
      required:
        - type
    AbstractClientError:
      description: Error reasoned by client.
      allOf:
        - $ref: '#/components/schemas/AbstractError'
        - properties:
            status:
              type: integer
              description: The HTTP status code.
              minimum: 400
              maximum: 499
    IncorrectStructureError:
      description: Request data (paths, query params, headers or request body) provided by client, has incorrect structure.
      allOf:
        - $ref: '#/components/schemas/AbstractClientError'
        - properties:
            type:
              const: INCORRECT_STRUCTURE
            status:
              const: 400
            violations:
              description: Structure violations.
              type: array
              items:
                properties:
                  field:
                    description: Field.
                    type: string
                  value:
                    description: Passed value.
                    type: string
                  message:
                    description: Message.
                    type: string
    UnauthorizedError:
      description: Unauthorized.
      allOf:
        - $ref: '#/components/schemas/AbstractClientError'
        - properties:
            type:
              const: UNAUTHORIZED
            status:
              const: 401
      example:
        type: UNAUTHORIZED
        title: Unauthorized
        status: 401
        detail: Full authentication is required to access this resource
    ForbiddenError:
      description: Forbidden.
      allOf:
        - $ref: '#/components/schemas/AbstractClientError'
        - properties:
            type:
              const: FORBIDDEN
            status:
              const: 403
    ServerError:
      description: Error reasoned by server.
      allOf:
        - $ref: '#/components/schemas/AbstractError'
        - properties:
            type:
              const: UNKNOWN_ERROR
            status:
              type: integer
              description: The HTTP status code.
              minimum: 500
              maximum: 599
    VatInvoiceId:
      description: |
        Invoice (Vat or Corrective) unique id.  
        Pattern explained: `VI-(invoice type)-(invoice issue date)-(uuid v4)`

        Invoice prefix:  
        `VI` - Vat Invoice  

        Invoice types:  
        `STD` - Standard  
        `PRP` - Prepayment  
        `FIN` - Final  
        `SPL` - Simplified  

        Invoice issue date format is `yyyyMMdd`.
      type: string
      minLength: 52
      maxLength: 52
      pattern: (VI-(STD|PRP|FIN|SPL))-(\d{4})(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])-[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}
      example: VI-STD-20220222-6a2f41a3-c54c-fce8-32d2-0324e1c32e22
    TransactionType:
      description: |
        Transaction type.
        | Type | Description |
        | - | - |
        | LOCAL | Local transaction. |
        | INTRA_COMMUNITY | intra-Community transaction. |
        | EXTRA_COMMUNITY | extra-Community transaction. |
      type: string
      format: enum
      enum:
        - LOCAL
        - INTRA_COMMUNITY
        - EXTRA_COMMUNITY
    TransactionPricesVatScheme:
      description: |
        Prices vat scheme.
        | Scheme | Description |
        | - | -- |
        | VAT_INCLUSIVE | Vat inclusive price in other words **gross price**. |
        | VAT_EXCLUSIVE | Vat exclusive price in other words **net price**. |
      type: string
      enum:
        - VAT_INCLUSIVE
        - VAT_EXCLUSIVE
    TransactionNumber:
      description: |
        Transaction number.  
        Interpretation may be different and depends on transaction type.  
        It can be `receipt number`, `order number`, `arrangement number` etc.
      type: string
      minLength: 1
      maxLength: 256
    TransactionOriginType:
      description: |
        Transaction origin type.
      type: string
      format: enum
      enum:
        - ORDER
        - CONTRACT
    TransactionOrigin:
      description: |
        Transaction origin (contract or order) details.
      properties:
        type:
          $ref: '#/components/schemas/TransactionOriginType'
        number:
          description: Contract/Order number.
          type: string
          minLength: 1
          maxLength: 256
        date:
          description: Contract/Order date.
          type: string
          format: date
      required:
        - type
    TransactionOrigins:
      type: array
      items:
        $ref: '#/components/schemas/TransactionOrigin'
    Rate:
      type: number
      format: double
      minimum: 0
      multipleOf: 0.000001
      example: 4.512
    Exchange:
      description: Exchange currency and rate.
      properties:
        currency:
          allOf:
            - $ref: '#/components/schemas/CurrencyCode'
        rate:
          allOf:
            - $ref: '#/components/schemas/Rate'
      required:
        - currency
        - rate
    TransportDescriptionType:
      description: |
        | Type | Description |
        | - | -- |
        | SEA | Sea transport |
        | RAIL | Rail transport |
        | ROAD | Road transport |
        | AIR | Air transport |
        | POSTAL_CONSIGNMENT | Postal consignment |
        | FIXED_TRANSPORT_INSTALLATION | Fixed transport installation |
        | INLAND_WATERWAY | Inland waterway |
      type: string
      format: enum
      enum:
        - SEA
        - RAIL
        - ROAD
        - AIR
        - POSTAL_CONSIGNMENT
        - FIXED_TRANSPORT_INSTALLATION
        - INLAND_WATERWAY
      example: POSTAL_CONSIGNMENT
    TransportDescriptionOther:
      description: Other transport type description.
      type: string
      minLength: 1
      maxLength: 50
    TransportDescription:
      description: Transport description (one of defined or custom).
      anyOf:
        - $ref: '#/components/schemas/TransportDescriptionType'
        - $ref: '#/components/schemas/TransportDescriptionOther'
    IdentifierType:
      description: |
        | Type | Description |
        | - | --- |
        | NIP | Nip identifier. In Poland 'NIP' is number used for 'VAT identification number' (but not only, also for other purposes). In other words national VAT identification number. |
        | EU | Vat identifier in European Union (mostly its just national vat tax identifier prefixed with country code). |
        | OTHER | Other identifier (e.g. in United States EIN). |
        | INTERNAL | KSeF internal identifier. </br></br> ⚠️ <span style="color:red">**Mostly used in `vatGroupMemberRecipient`, `localGovernmentUnitRecipient`, `recipient`, `employee` third parties structure.**</span> |
      type: string
      format: enum
      enum:
        - NIP
        - EU
        - OTHER
        - INTERNAL
    AbstractIdentifier:
      properties:
        type:
          $ref: '#/components/schemas/IdentifierType'
      required:
        - type
    NipIdentifier:
      description: NIP identifier.
      allOf:
        - $ref: '#/components/schemas/AbstractIdentifier'
        - properties:
            type:
              const: NIP
            nip:
              description: |
                Nip identifier. In Poland 'NIP' is number used for VAT purposes (as 'VAT identification number').
              type: string
              example: '5252535950'
              pattern: '[1-9]((\d[1-9])|([1-9]\d))\d{7}'
          required:
            - type
            - nip
          example:
            type: NIP
            nip: '5252535950'
