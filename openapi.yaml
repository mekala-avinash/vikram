      parameters:
        - $ref: '#/components/parameters/invoiceId'
      tags:
        - Invoices assignment
      summary: Delete invoice assignment.
      description: |
        Deletes the current assignment of an invoice. Once deleted, the invoice will be re-queued and processed again by the classification engine.
      operationId: deleteInvoiceAssignment
      responses:
