            (Representation) Corrective (by SmartKSeF ID, BY_DIFF method, voiding the whole invoice) Standard B2B invoice:
              $ref: '#/components/examples/StandardB2BVoid-2'
            (Representation) Corrective (by SmartKSeF ID) Simplified invoice:
              $ref: '#/components/examples/031-corrective_simplified-2'
            (Representation) Corrective (by SmartKSeF ID, BY_DIFF method) Prepayment invoice (1st):
              $ref: '#/components/examples/PrepaymentInvoice1st-4'
            (Representation) Corrective (by SmartKSeF ID, BY_DIFF method) Prepayment invoice (next):
              $ref: '#/components/examples/PrepaymentInvoiceNext-4'
            (Representation) Corrective (by SmartKSeF ID) Final invoice (no changes):
              $ref: '#/components/examples/FinalInvoiceNoChanges-4'
            (Representation) Corrective (by SmartKSeF ID, BY_DIFF method) Final invoice (surcharge):
              $ref: '#/components/examples/FinalInvoiceSurcharge-4'
            (Representation) Corrective (by SmartKSeF ID, BY_DIFF method) Final invoice (overpayment):
              $ref: '#/components/examples/FinalInvoiceOverpayment-4'
            (Representation) Corrective (by SmartKSeF ID, BY_VOID method) Standard B2B invoice:
              $ref: '#/components/examples/StandardCorrectiveB2BRefByOriginalInvoiceReferenceMethodByVoid-2'
            (Representation) Invoice and Corrective (by SmartKSeF ID, BY_VOID method) Standard B2B invoice - Return Items:
              $ref: '#/components/examples/StandardCorrectiveAndIvoiceByVoidReturnItems-2'
            (Representation) Invoice and Corrective (by SmartKSeF ID, BY_VOID method) Standard B2B invoice - Quantity and price:
              $ref: '#/components/examples/StandardCorrectiveAndIvoiceByVoidQuantityPrice-2'
            (Representation) Invoice and Corrective (by SmartKSeF ID, BY_VOID method) Standard B2B invoice - Quantity:
              $ref: '#/components/examples/StandardCorrectiveAndIvoiceByVoidQuantity-2'
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/NotFoundError'
          examples:
            NotFound:
              value:
