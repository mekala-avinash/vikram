info:
  version: 2026.02.25
  title: Smart KSeF API
  contact:
    name: Exorigo-Upos
    email: smartksef@exorigo-upos.pl
    url: https://www.exorigo-upos.pl
  x-logo:
    url: ./images/logo.svg
  description: |
    # Introduction

    API has been designed to simplify and clarify Invoices registration, synchronization and propagation in and from KSeF
    system.

    # Formats

    | Format        | Definition                                                                        | Examples                                            |
    |---------------|-----------------------------------------------------------------------------------|-----------------------------------------------------|
    | **date**      | [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) `full-date` | `2022-02-14`                                        |
    | **date-time** | [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.6) `date-time` | `2022-02-14T08:00:00Z`, `2022-02-14T08:00:00+01:00` |
    | **period**    | [RFC 3339](https://datatracker.ietf.org/doc/html/rfc3339#appendix-A) `period`     | `2022-02-01/P1M`, `2022-02-01/2022-02-28`           |
    | **uuid**      | [RFC 4122](https://datatracker.ietf.org/doc/html/rfc4122)                         | `123e4567-e89b-12d3-a456-426614174000`              |

    # Changelog

    | Version    | Changes                                                                                                                                                                          |
    |------------|----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|
    | 2026.02.25 | Added `PUT /invoices/{invoiceId}/assignment` to manually set invoice assignment (ASSIGNED/UNASSIGNED/REJECTED). Added `DELETE /invoices/{invoiceId}/assignment` to remove assignment and re-queue invoice for classification engine. |
    | 2026.02.23 | Removed previously deprecated  fields - `reason` from `InvoiceMinimalProjection` and `reason` + `source` from 'InvoiceRepresentationProjection'|
    | 2026.02.06 | Added `sellerTaxId`, `buyerTaxId` and `number` query parameters to `GET /invoices` search endpoint. |
    | 2026.01.13 | Clarify `transaction.amount` description (in case of Prepayment/Final Invoices). Added optional `transaction.totalAmount` for Prepayment/Final Invoices with description about default behaviour. |
    | 2025.12.23 | Drop `marginAmount` requirement (for backward compatibility), support for UPO v4.3 (change invisible for integrators). |
    | 2025.12.10 | Added `rejection` structure to Invoices response (instead of separated fields `source` and `reason` that could be missunderstood. Add `VAT_MARGIN` support. Added `sourceSystem` to all webhooks |
    | 2025.10.20 | Introduced support for `FA (3)` schema on staging environment (the default is still `FA (2)` but for staging environment the `X-KSEF-SCHEMA=FA (3)` is already supported). </br>Updated the `X-KSEF-ENV` about KSeF version integration (KSeF 1.0 or KSeF 2.0), the KSeF tokens has been generated and updated for all entities! </br>New POST /invoice header parameter `X-KSEF-OPTIONS` proposal. </br>`X-KSEF-REGISTRATION_MODE` -> `X-KSEF-REGISTRATION-MODE` typo fix, added feature availability date (29.10.2025). </br>The `payments.description`, `payments.link` and `payments.ksefId` are applicable only for UnpaidPayment (it was visible on PaidPayment but not handled in implementation), added description about behaviour for FA (2)/FA (3) for `payments.description` parameter. </br>The `transport.initialAddress` and `transport.finalAddress` are not required anymore (the change will be released 29.10.2025). </br>Documented missing `thirdParties.employee` for `InvoiceMinimalProjection`. </br>New `currencyCode` and `exchangeRate` parameters for `PeriodCorrectiveInvoices` (already deployed).    |
    | 2025.09.12 | Added internal identifier (`taxId.internal`) for third parties (`IDWew` in KSeF).                                                                                                                                     |
    | 2025.09.03 | Fix `ksef/state` response schema (missing `AVAILABLE` case).                                                                                                                            |
    | 2025.08.13 | Added `confirmationDateTime` to Invoice response API.                                                                                                                            |
    | 2025.08.08 | Added `taxId` for all events. Added event for Invoice `ACCEPTED`. Added `X-REGISTRATION-MODE` that allows to handle OFFLINE/ONLINE Invoices. Added `verificationCodes` structure in respone that contains verification codes (that should be presented as QR Codes). |
    | 2025.07.01 | Added invoice.assignment structure. Added `X-KSEF-SCHEMA` that allows to choose which KSeF schema should be used for Invoice. Adjusted to `FA (3)` with backward compatibility (every impacted field has information how it's treated depending of choosen schema), impacted structures: `transaction.items` (`name`), `transaction.payments` (`date`, `term`, `bank account number`, `link`, `ksefId`), `thirdParties` (`employee`, `address`), `attachments`. Added flow diagrams. Added more detailed structures description. Added event for `SENT` and `CONFIRMED`.   
    | 2025.04.23 | New Invoice status `CONFIRMED`. Better `X-KSEF-ENV` header description, added supported values matrix (depends on application environment). `transaction.items.*.gtin` wiki link |
    | 2025.04.14 | Added minimal projection for third parties.                                                                                                                                      |
    | 2025.03.31 | Update API schema mapping - PL and ENG versions, changes in fields mapping: <br/>- `P_18` - fix mapping information - reverse charge flag,<br/>- fixed many typos                |
    | 2025.02.24 | Fix openapi definition, no functional changes in: `attachments structure`, `X-Total-Count`.                                                                                      |
    | 2025.02.18 | Added section `Offline link generation (QR Code)`.                                                                                                                               |
    | 2024.10.23 | Purchase invoices endpoint deprecated.                                                                                                                                           |
    | 2024.10.09 | Removed unused endpoint for searching invoice by externalId (ksefId).                                                                                                            |
    | 2024.10.04 | Extend CreditPaymentMethod - added optional `account` that allows to pass information about Bank account (similar to `TRANSFER`).                                                |
    | 2024.09.13 | Invoices: added endpoint for searching invoices by filter.                                                                                                                       |
    | 2024.09.12 | Invoices: added new endpoint for searching invoice by externalId (ksefId).                                                                                                       |
    | 2024.09.09 | Invoices: fixed items.originalRef structure (should be mandatory but was not), added more detailed description.                                                                  |
    | 2024.08.12 | Schema: added link to English version of structure mapping between SmartKSeF <> KSeF.                                                                                            |
    | 2024.08.07 | Invoices: added more detailed description to issueDate.                                                                                                                          |
    | 2024.07.18 | Invoices: added new ksefState field that gives information about KSeF status while receiving Invoice.                                                                            |
    | 2024.07.08 | Invoices: fixed Invoice Batch creation response.                                                                                                                                 |
    | 2024.07.05 | Invoices: added optional Header attribute `X-KSEF-ENV` that allows to specify to which KSeF environment Invoice should be registered.                                            |
    | 2024.06.14 | Invoices: added more detailed description for previews structure (url's to invoice ins SmartKSeF and KSeF - verification link that should be printed as QR code.                 |
    | 2024.06.11 | Invoices: added more detailed description for TransactionItem structure.                                                                                                         |
    | 2024.06.06 | Invoices: rejection reason added to InvoiceMinimalProjection.                                                                                                                    |
    | 2024.06.04 | Notifications: support for aggregating events </br> External Invoices - API for importing External Invoices from KSeF.                                                           |

    # Authentication

    We use OAuth 2.0 standard for authentication with tokens in JWT format. We have separate authorization servers for each
    environment.
    For more information see: <https://datatracker.ietf.org/doc/html/rfc6749> especially section 4.4 which describe client
    credentials flow which we use to
    authenticate you application.

    | Environment | Endpoints                                                                                                                                     |
    |-------------|-----------------------------------------------------------------------------------------------------------------------------------------------|
    | staging     | token_endpoint: <https://login.smartksef-staging.exorigo-upos.pl/d92dfc98-2b80-4938-97f5-d4bee2112678/oauth2/v2.0/token?p=B2C_1_susi_default> |
    | prod        | token_endpoint: <https://login.smartksef.exorigo-upos.pl/977b687f-eee2-42fb-b90d-d5f4a506c0f7/oauth2/v2.0/token?p=b2c_1_susi>                 |

    Client credentials flow describes that you application need `client_id` and `client_secret` to authenticate.
    To get your credentials you have to contact with us at [smartksef@exorigo-upos.pl](mailto:smartksef@exorigo-upos.pl) -
    we will create application account for
    you and reply with you `client_id` and `client_secret`.

    Client credentials flows looks as follows:

    <img src="./images/oauth2_client_credentials_flow.gif" alt="client credentials flow diagram">

    Where Authorization Server is one of described above (depends on environment), and Resource Server is just our API
    endpoint.

    <details>
    <summary>Example scenario that covers authorization and using our invoice API.</summary>

    First step is to authorize you application and receive access token:

    ```http
    POST https://login.smartksef-staging.exorigo-upos.pl/b8c90d80-f2f9-4433-8104-3e3201e2258d/oauth2/v2.0/token?p=b2c_1_susi
    Content-Type: application/x-www-form-urlencoded

    grant_type=client_credentials&client_id={PUT_YOUR_CLIENT_ID_HERE}&client_secret={PUT_YOUR_CLIENT_SECRET}&scope=https://login.smartksef-staging.exorigo-upos.pl/api/invoices/.default
    ```

    In response you should receive `access_token` as follow:

    ```json
    {
      "access_token": "ACCESS_TOKEN_IN_JWT_FORMAT",
      "token_type": "Bearer",
      "not_before": 1691738849,
      "expires_in": 3600,
      "expires_on": 1691742449,
      "resource": "f34c84dd-42ec-484a-8d60-6f38b757e661"
    }
    ```

    In next step you put `access_token` in invoice request `Authorization` header:

    ```http
    GET https://api.smartksef-staging.exorigo-upos.pl/invoices/VI-STD-20220325-5a8f2173-e64d-fce8-32d2-0e0321c32e2
    Authorization: Bearer {access_token}
    ```

    And finally get the result.

    Important! You should use the same `access_token` until it gets expired! Don't repeat entire flow every time you call
    API instead of this reuse `access_token`
    that you already have.

    </details>

    # Schema versioning

    Our API uses media type versioning. Version information and media type are provided in HTTP Content-Type header — e.g.
    application/x.smartksef.invoice+json;version=2. For incompatible changes, a new media type version for the resource is
    created. To generate the new
    representation version, consumer and producer can do content negotiation using the HTTP Content-Type and Accept headers.

    # Errors

    Errors are returned in format proposed in [RFC 7807](https://datatracker.ietf.org/doc/html/rfc7807). See schema below:
    <SchemaDefinition schemaRef="#/components/schemas/Error" />

    # Common Usage scenarios

    ## Validation before real request

    To perform only validation before real request you should use `dryRun` request parameter.

    Depending on applications requirements and limitations your integration can be based on one of common usage scenarios.
    You can read about them in more details
    below.

    ## Invoice issuing

    ### Tenant application with allowed public incoming network traffic

    Most recommended integration pattern. In this scenario tenant application sends Invoice to register and receives
    updates (including final confirmation) by
    callback API (like notifications - requests are sent from SmartKSeF to tenant application).

    Pushing scenario diagram:

    <img src="./images/registerWithCallbackFlow.svg" alt="register_callback_flow" />

    ### Tenant application with prohibited public network incoming traffic

    In this scenario regarding network limitations we are not able to connect from SmartKSeF to Tenant application callback
    API which notifies about Invoice
    processing updates is not available.
    To allow tenant applications for receiving updates we recommend to use `getInvoice` API in other words it's `pooling`.

    Pooling scenario diagram:

    <img src="./images/registerWithPoolingFlow.svg" alt="register_pooling_flow" />

    ### Tenant application cannot or not need to receive confirmation about Invoice registration in KSeF

    Send and forget scenario diagram:

    <img src="./images/registerWithForgettingFlow.svg" alt="register_without_confirmation_flow" />

    ## Invoice receiving

    ### Pooling

    In this scenario, the tenant application requests headers of the purchase invoices registered in KSeF between specified
    date-times.

    <img src="./images/purchaseInvoicesPooling.svg" alt="purchase_invoices_pooling" />

    ### Pushing

    In this scenario, the tenant application receives updates whenever a newly registered purchase invoice is available in
    SmartKSeF.

    <img src="./images/purchaseInvoicesPushing.svg" alt="purchase_invoices_pushing" />

    # Common Errors handling

    In this section we describe how to handle common errors which can occur.

    ## Network errors - Connection refused/Connection timeout/Read timeout

    For all that cases we have the same handling scenario which is described on following diagram:

    <img src="./images/registerTryWithNetworkError.svg" alt="network_problem_flow" />

    # Notifications (via webhook)

    Our solution supports notifications for part of the events that appears in our system. Notifications allows you to
    subscribe your service to get information
    about specific events that are happening in SmartKSeF without doing periodical checks. We use webhook mechanism for
    that.

    Currently, to receive events we need to create subscription for your service which is manual process that requires you
    to provide details about your listening
    service to Exorigo-Upos.

    In context of security our system needs to be authenticated somehow by your subscribing system (listener). Depending on
    your security requirements we support
    few authentication solutions:

    - OAuth 2.0 client_credentials (preferred)
    - API Key (via request parameter, custom htp header et.c) + network communication isolation (e.g. by private network
      connection)

    Communication is always realized by https with TLS 1.2 encryption.

    ## Subscription details

    To create subscription for your service we need to provide some data in our system about the target service to which
    events will be propagated. The common
    requirement is to provide your service `url` and one of described below (depending on chosen authentication mechanism)
    authentication details. While defining
    subscription for your system there are two options of delivering notifications:

    - singular - you will receive immediately notification via webhook about every particular Invoice (check #invoiceEvent
      webhook API)
    - aggregated - we will aggregate notifications and send them after delivery conditions are meet (check
      #invoiceAggregatedEvents webhook API)

    For the aggregated option there are additional parameters required that describes delivery conditions:

    - `interval` - Configures the interval between deliveries (e.g. 5 minutes)
    - `threshold` - Configures the minimum amount of aggregated notifications to trigger delivery (even if interval is not
      reached, e.g. 1000 notifications)

    For example if we configure `interval` for 5 minutes and `threshold` for 1000 notifications it means that our service
    will send webhook notifications every 5
    minutes (always, even if there are only few notifications to delivery) **or** immediately if notifications amount
    reaches 1000 (what can take place earlier than
    5 min interval). So assuming in this example configuration we will send notifications every 5 minutes or if the amount
    of collected notifications reaches 1000 (
    regarding what commes first).

    Currently `threshold` can be configured to at most 1000 messages (the max amount of aggregated events that we can
    deliver via one webhook API call).

    ### OAuth 2.0 client credentials flow

    To use OAuth 2.0 authentication with client credentials flow (which is natively designed for this kind of
    communication). Currently, we support only client
    credential flow with body authentication that means our token requests uses POST http method with Content-Type:
    application/x-www-form-urlencoded and client_id
    and client_secret passed in request body, e.g.:

    ```http
    POST ${token_url}
    Content-Type: application/x-www-form-urlencoded

    grant_type=client_credentials&client_id=${client_id}&client_secret=${client_secret}&scope=${scope}
    ```

    That means we expect to have:

    - `token_url` - url for token endpoint of authentication server that issues access tokens
    - `client_id` - client identifier issued to the client during
      the registration process in your authentication provider.
    - `client_secret` - client secret issued to the client during
      the registration process in your authentication provider.
    - `scope` - scope parameter that you are expecting that gives permissions to communicate with your service

    ### API Key

    To use API Key authentication we recommend to use additional security layer (e.g. connection via private network).

    To use API Key authentication we need following information about your service:

    - `location` - where API Key is expected to be placed - `http header/query parameter/request body`
    - `name` - name of the API Key parameter, e.q. `X-API-KEY` for http header, `apiKey` for query parameter
    - `value` - value expected by your service to be correctly recognized

    # API schema mapping to FA(2)

    We have documented how we map data into `FA(2)` schema, documentation is
    available [here (ENG)](<./api_mapping_to_ksef_fa(2)_ENG.pdf>) or [here (PL)](<./api_mapping_to_ksef_fa(2)_PL.pdf>).

    # Offline link generation (QR Code)

    Our solution supports situation when the client application is working in temporarily offline (have no access to
    Internet, especially to our SmartKSeF solution)
    or your application have to send Invoice data after finished transaction (for several reasons). To aim that requirement
    we implemented in our solution
    possibility to generate link where Invoice will be available as soon as we receive information about you from your
    system. Basically the use case presents as
    follows:

    1. Your application finishes some transaction that requires Invoicing.
    2. Your application generates offline link that meets our simple requirements.
    3. Your application prints that offline link/presents it other way (via sms/email etc.).
    4. After some time your application sends Invoice to SmartKSeF with information that was generated offline.
    5. When clients use your offline link they will visit our portal website (anonymously) where Invoice will be available.

    To generate `offline` link to Invoice you need to implement in your application following url pattern:

    `https://portal.smartksef${environment_suffix}.exorigo-upos.pl/anonymous/${tenant_id}/invoices/${invoice_id}`

    Where:

    - `environment_suffix` - is environment specific (staging/prod), for `staging` environment there is `-staging` suffix,
      for prod there is no suffix at all,
    - `tenant_id` - is your unique identifier in our SmartKSeF system (will be different on different environments),
    - `invoice_id` - is invoice identifier generated by our application, it's pattern is more detailed described in our
      Invoice data structures (e.g. in API
      definition `POST /invoices` it's id of Invoice request body)
        - Example `staging` full url:
          `https://portal.smartksef-staging.exorigo-upos.pl/anonymous/d92dfc98-2b81-4938-97f5-d4bee2112678/invoices/VI-STD-20241217-805c6923-ba32-4b0f-ba43-15c2ab46ae3f`,
        - Example `production` full url:
          `https://portal.smartksef.exorigo-upos.pl/anonymous/d92dfc98-2b81-4938-97f5-d4bee2112678/invoices/VI-STD-20241217-805c6923-ba32-4b0f-ba43-15c2ab46ae3f`

    When you generate offline link the most important thing is to use the same `invoice_id` when generated link as far as in
    Invoice data send to as in
    `POST /invoices` request.

    To apply more usability for your customers we recommend to visualize link using QR Code.
