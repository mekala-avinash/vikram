  /actuator/health:
    get:
      summary: Get health status of the application
      description: Returns the health status of the application along with additional details.
      tags:
        - Actuator
      responses:
        '200':
          description: OK. The application is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Health status of the application.
                    enum:
                      - UP
                  details:
                    $ref: '#/components/schemas/ActuatorHealthDetails'
        '500':
          description: Internal Server Error. An unexpected error occurred while checking the health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '503':
          description: Service Unavailable. The application is not healthy or not yet ready to handle requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Health status of the application.
                    enum:
                      - DOWN
                      - STARTING
                  details:
                    $ref: '#/components/schemas/ActuatorHealthDetails'
      security: []
  /ksef/state:
    get:
      summary: Get state of the KSEF service
      description: Returns the state of the KSEF service along with additional details.
      tags:
        - KSEF
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KsefStateApi'
              examples:
                ksefAvailableApi:
                  summary: KSEF available.
                  description: KSEF service is available.
                  value:
                    status: AVAILABLE
                ksefUnavailableApi:
                  summary: KSEF is unavailable.
                  description: KSEF service is unavailable due to a planned disruption.
                  value:
                    id: 1
                    disruptionType: PLANNED
                    disruptionDescription: test
                    startAt: '2025-09-03T12:34:00.2509231+02:00'
                    endAt: '2025-09-03T12:34:00.2509231+02:00'
                    status: UNAVAILABLE
        '400':
          description: Bad Request
        '500':
          description: Internal Server Error
      security: []
webhooks:
  invoiceEvent:
    post:
      security:
        - {}
      tags:
        - Invoices
      summary: Invoice event.
      description: |
        Only if subscribed.
      requestBody:
        content:
          application/x.smartksef.invoice+json;version=2:
            schema:
              $ref: '#/components/schemas/InvoiceEvent'
      responses:
        '200':
          description: Event is marked as successfully delivered to subscriber.
        '400':
          description: Event delivery is suspended and marked to clarify where is the problem (manually by support).
        '409':
          description: Event is marked as successfully delivered to subscriber (by duplication).
        '500':
          description: Service will retry event delivery few more times.
  invoiceAggregatedEvents:
    post:
      security:
        - {}
      tags:
        - Invoices
      operationId: invoiceAggregatedEvents
      summary: Invoice aggregated events.
      description: |
        Only if subscribed.
      requestBody:
        content:
          application/x.smartksef.invoice+json;version=2:
            schema:
              $ref: '#/components/schemas/InvoiceEvents'
      responses:
        '200':
          description: Event is marked as successfully delivered to subscriber.
        '400':
          description: Event delivery is suspended and marked to clarify where is the problem (manually by support).
        '409':
          description: Event is marked as successfully delivered to subscriber (by duplication).
        '500':
          description: Service will retry event delivery few more times.
  purchaseInvoices:
    post:
      deprecated: true
      security:
        - {}
      tags:
        - Purchase Invoices
      operationId: purchaseInvoiceWebhook
      summary: Purchase Invoice
      description: Notifies about purchase invoice events.
      requestBody:
        content:
          application/x.smartksef.invoice+json;version=2:
            schema:
              $ref: '#/components/schemas/AbstractValidatedInvoice'
        required: true
      responses:
        '200':
          description: OK, invoice delivered successfully.
        '400':
          description: Invoice delivery suspended, to be manually checked.
        '409':
          description: Invoice marked as successfully delivered (duplication).
        '500':
          description: Service will retry invoice delivery a few more times.
components:
  securitySchemes:
    OAuth2ClientCredentials-Staging:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://login.smartksef-staging.exorigo-upos.pl/d92dfc98-2b80-4938-97f5-d4bee2112678/oauth2/v2.0/token?p=b2c_1_susi
          scopes:
            https://login.smartksef-staging.exorigo-upos.pl/api/invoices/.default: Allows to access SmartKSeF API.
    OAuth2ClientCredentials-Prod:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://login.smartksef.exorigo-upos.pl/b8c90d80-f2f9-4433-8104-3e3201e2258d/oauth2/v2.0/token?p=b2c_1_susi
          scopes:
            https://login.smartksef.exorigo-upos.pl/api/.default: Allows to access SmartKSeF API.
    OAuth2AuthorizationCodeWithPKCE-Staging:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://login.smartksef-staging.exorigo-upos.pl/d92dfc98-2b80-4938-97f5-d4bee2112678/oauth2/v2.0/authorize?p=b2c_1_susi
          tokenUrl: https://login.smartksef-staging.exorigo-upos.pl/d92dfc98-2b80-4938-97f5-d4bee2112678/oauth2/v2.0/token?p=b2c_1_susi
          scopes:
            https://login.smartksef-staging.exorigo-upos.pl/api/invoices/user_impersonation: Allows to access SmartKSeF API on behalf of logged user.
          x-usePkce:
            disableManualConfiguration: false
            hideClientSecretInput: true
    OAuth2AuthorizationCodeWithPKCE-Prod:
      type: oauth2
      flows:
        authorizationCode:
          authorizationUrl: https://login.smartksef.exorigo-upos.pl/977b687f-eee2-42fb-b90d-d5f4a506c0f7/oauth2/v2.0/authorize?p=b2c_1_susi
          tokenUrl: https://login.smartksef.exorigo-upos.pl/977b687f-eee2-42fb-b90d-d5f4a506c0f7/oauth2/v2.0/token?p=b2c_1_susi
          scopes:
            https://login.smartksef.exorigo-upos.pl/api/user_impersonation: Allows to access SmartKSeF API on behalf of logged user.
          x-usePkce:
            disableManualConfiguration: false
            hideClientSecretInput: true
  parameters:
    page:
      name: page
      in: query
      required: false
      description: |
        page number index
      schema:
        type: integer
        minimum: 0
        default: 0
    size:
      name: size
      in: query
      required: false
      description: |
        page size
      schema:
        type: integer
        default: 10
    createdAtSince:
      name: createdAtSince
      in: query
      required: false
      description: |
        earliest invoice created date-time in SmartKsef, inclusive
      schema:
        type: string
        format: date-time
        example: '2022-08-25T08:00:00Z'
    since:
      name: since
      in: query
      required: false
      description: |
        earliest invoice registration date-time (based on KSeF's data), inclusive
      schema:
        type: string
        format: date-time
        example: '2022-08-25T08:00:00Z'
    until:
      name: until
      in: query
      required: false
      description: |
        latest invoice registration date-time (based on KSeF's data), inclusive
      schema:
        type: string
        format: date-time
        example: '2022-08-25T08:00:00Z'
    party:
      name: party
      in: query
      required: false
      description: |
        specifies whether the search for sale (`SELLER`), purchase (`BUYER`), third (`THIRD`) or external (`EXTERNAL`) invoices
      schema:
        description: |
          The `party` parameter allows you to filter invoices based on the role of the legal entity in the invoice. 
          - `SELLER`: Invoices where the legal entity is the seller.
          - `BUYER`: Invoices where the legal entity is the buyer.
          - `THIRD`: Invoices where the legal entity is a third party (neither seller nor buyer).
          - `EXTERNAL`: Invoices where the legal entity does not appear in any role on the invoice.
        type: string
        enum:
          - SELLER
          - BUYER
          - THIRD
          - EXTERNAL
        default: SELLER
    ksefId:
      name: ksefId
      in: query
      required: false
      description: |
        invoice KSeF ID
      schema:
        type: string
    sellerTaxId:
      name: sellerTaxId
      in: query
      required: false
      description: |
        seller's tax ID
      schema:
        type: string
        minLength: 1
        maxLength: 50
    buyerTaxId:
      name: buyerTaxId
      in: query
      required: false
      description: |
        buyer's tax ID
      schema:
        type: string
        minLength: 1
        maxLength: 50
    number:
      name: number
      in: query
      required: false
      description: |
        invoice number
      schema:
        $ref: '#/components/schemas/InvoiceNumber'
    dryRun:
      name: dryRun
      in: query
      required: false
      example: true
      description: |
        When true it will only validate the request (no data will be persisted, no action will be applied).  
      schema:
        type: boolean
        default: false
    prefer:
      name: Prefer
      in: header
      description: |
        The RFC7240 Prefer header indicates that a particular server behavior
        is preferred by the client but is not required for successful completion
        of the request (see [RFC 7240](https://tools.ietf.org/html/rfc7240).
        The following behaviors are supported by this API:

        * **return=<minimal|representation>** is used to suggest the server to
          return using 204 without resource (minimal) or using 200 or 201 with
          resource (representation) in the response body on success.
      examples:
        preferReturnMinimal:
          summary: Example headers value when minimal response projection is enough for client.
          value: return=minimal
        preferReturnRepresentation:
          summary: Example headers value when representation response projection is required by client.
          value: return=representation
      required: false
      schema:
        type: string
        format: enum
        enum:
          - return=minimal
          - return=representation
        default: return=minimal
    X-KSEF-ENV:
      name: X-KSEF-ENV
      in: header
      description: |
        Specifies the KSeF environment the server is expected to use to register the invoice.
        If not set, the invoice will be sent to the environment specified in tenant configuration
        (therefore, the header is required if tenant doesn't have a specified environment) or if at the tenant configuration
        there is specified `DEFAULT`, invoice will be sent to the environment specified at application configuration.

        Application configuration depends on SmartKSeF environment and has following settings:

        | SmartKSeF environment | Default application KSeF environment |
        | --- | --- |
        | staging | `TEST` (API KSeF 2.0) |
        | prod | `PROD` (API KSeF 1.0) |

        Currently supported `X-KSEF-ENV` header values matrix (depends on SmartKSeF environment)

        | SmartKSeF environment | Supported `X-KSEF-ENV` |
        | --- | --- |
        | staging | `DEFAULT` (which is `TEST`), `MOCK` (API KSeF 2.0), `TEST` (API KSeF 2.0) |
        | prod | `DEFAULT` (which is `PROD`), `PROD` (API KSeF 1.0) |
      required: false
      schema:
        default: DEFAULT
        type: string
        format: enum
        enum:
          - DEFAULT
          - MOCK
          - TEST
          - DEMO
          - PROD
    X-KSEF-SCHEMA:
      name: X-KSEF-SCHEMA
      in: header
      description: |
        Specifies the KSeF schema that should be used for processing the Invoice.

        Application configuration depends on SmartKSeF environment and has following settings:

        | SmartKSeF environment | Default application KSeF schema |
        | --- | --- |
        | staging | `FA2` |
        | prod | `FA2` |

        Currently supported `X-KSEF-SCHEMA` header values matrix (depends on SmartKSeF environment)

        | SmartKSeF environment | Supported `X-KSEF-SCHEMA` |
        | --- | --- |
        | staging | `DEFAULT` (which is `FA2`), `FA2`, `FA3` |
        | prod | `DEFAULT` (which is `FA2`), `FA2` |
      required: false
      schema:
        default: DEFAULT
        type: string
        format: enum
        enum:
          - DEFAULT
          - FA2
          - FA3
    X-KSEF-REGISTRATION-MODE:
      name: X-KSEF-REGISTRATION-MODE
      in: header
      description: |
        Specifies the Invoice KSeF registration mode (ONLINE/OFFLINE).

        ⚠️ <span style="color:red">**For ONLINE mode there will be generated online code (verification code that should be presented as QR Code).**</span>

        ⚠️ <span style="color:red">**For OFFLINE mode there will be generated offline codes (verification code and certificate code that should be presented as QR Code).**</span>
      required: false
      schema:
        default: ONLINE
        type: string
        format: enum
        enum:
          - ONLINE
          - OFFLINE
    X-KSEF-OPTIONS:
      name: X-KSEF-OPTIONS
      in: header
      description: |
        Specifies the Invoice additional options.

        | Option | Description |
        | --- | --- |
        | TRANSACTION-CONFIRMATION | Instructs the transaction confirmation should be created. It effectively triggers generation of `OFFLINE` codes (event if `X-KSEF-REGISTRATION-MODE` is set to `ONLINE`). |
      required: false
      schema:
        type: string
        format: enum
        enum:
          - TRANSACTION-CONFIRMATION
    X-SMART-KSEF-ID:
      name: X-SMART-KSEF-ID
      in: header
      description: |
        SmartKSeF Invoice id to use in `/invoices` API. 

        ⚠️ Available only for XML payload. 

        If not provided, it will be generated automatically.
      required: false
      schema:
        $ref: '#/components/schemas/InvoiceId'
    x-request-timeout:
      name: X-REQUEST-TIMEOUT
      in: header
      description: |
        **NOT SUPPORTED YET (considered to be implemented when KSeF performance will be satisfying)**

        Timeout (in milliseconds) for synchronous invoice creation request. Overrides the default value set for the environment.
      required: false
      schema:
        type: integer
        minimum: 0
        maximum: 2000
    invoiceId:
      name: invoiceId
      in: path
      required: true
      description: The id of the invoice
      schema:
        $ref: '#/components/schemas/InvoiceId'
    acceptJsonXmlHtmlPdf:
      name: Accept
      in: header
      required: false
      schema:
        type: string
        format: enum
        enum:
          - application/json
          - application/pdf
          - application/xml
          - text/xml
          - text/html
        default: application/json
    externalInvoiceId:
      name: externalInvoiceId
      in: path
      required: true
      description: The id of the External Invoice
      schema:
        $ref: '#/components/schemas/ExternalInvoiceId'
    attachmentIds:
      name: ids
      in: query
      required: true
      description: IDs of attachments
      schema:
        $ref: '#/components/schemas/AttachmentIds'
    attachmentId:
      name: attachmentId
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/AttachmentId'
  schemas:
    InvoiceNumber:
      type: string
      minLength: 1
      maxLength: 256
    InvoiceId:
      description: |
        Invoice (Vat or Corrective) unique id.  
        Pattern explained: `(invoice prefix)-(invoice type)-(invoice issue date)-(uuid v4)`

        Invoice prefix:  
        `VI` - Vat Invoice  
        `CI` - Corrective Invoice  

        Invoice types:  
        `STD` - Standard  
        `PRP` - Prepayment  
        `FIN` - Final  
        `SPL` - Simplified  
        `PRD` - Period (only for Corrective Invoice)  

        Invoice issue date format is `yyyyMMdd`.
      type: string
      minLength: 52
      maxLength: 52
      pattern: ((VI|CI)-(STD|PRP|FIN|SPL)|(CI-PRD))-(\d{4})(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])-[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}
      example: CI-PRD-20220222-6a2f41a3-c54c-fce8-32d2-0324e1c32e22
    InvoiceStatus:
      description: |
        Vat/Corrective Invoice Status.
        | Status | Description | 
        | - | -- |
        | ACCEPTED | Invoice has been accepted. |
        | SENT | Invoice has been sent correctly to KSeF and we are waiting for registration. |
        | REGISTERED | Invoice has been registered. |
        | CONFIRMED | Invoice has been confirmed (confirmation (formally `UPO`) has been received). It's success final status. |
        | REJECTED | Invoice has been rejected internally (by Smart KseF) or externally (by KSeF). It's failure final status. |
      type: string
      format: enum
      enum:
        - ACCEPTED
        - SENT
        - REGISTERED
        - CONFIRMED
        - REJECTED
    VatInvoiceType:
      description: |
        Vat Invoice types.
          | Type | Description |
          | -- | -- |
          | `VAT_STANDARD` | Standard Vat Invoice |
          | `VAT_PREPAYMENT` | Prepayment Vat Invoice is issued before products supply to document partial or total any kind of prepayment, advance, deposit etc. |
          | `VAT_FINAL` | Final Vat Invoice is issued after supply if previously issued Prepayment Invoices does not include entire payment. See: `art. 106f ust. 3 ustawy o VAT` |
          | `VAT_SIMPLIFIED` | Simplified Vat Invoice can be issued for National Buyer with NIP when transaction total amount is less than 450 PLN or 100 EUR. See: `art. 106e ust. 5 pkt 3 ustawy o VAT` |
      type: string
      format: enum
      enum:
        - VAT_STANDARD
        - VAT_PREPAYMENT
        - VAT_FINAL
        - VAT_SIMPLIFIED
    CorrectiveInvoiceType:
      description: |
        Corrective Invoice types.
          | Type | Description |
          | - | -- |
          | `CORRECTIVE_STANDARD` | Standard Corrective Invoice. |
          | `CORRECTIVE_PREPAYMENT` | Prepayment Corrective Invoice. |
          | `CORRECTIVE_FINAL` | Final Corrective Invoice. |
          | `CORRECTIVE_SIMPLIFIED` | Simplified Corrective Invoice. |
          | `CORRECTIVE_PERIOD` | Period Corrective Invoice. See: `art. 106j ust. 3 ustawy o VAT`. |
      type: string
      format: enum
      enum:
        - CORRECTIVE_STANDARD
        - CORRECTIVE_PREPAYMENT
        - CORRECTIVE_FINAL
        - CORRECTIVE_SIMPLIFIED
        - CORRECTIVE_PERIOD
    InvoiceKsefId:
      description: Identifier assigned by KSeF.
      type: string
      pattern: ([1-9]((\d[1-9])|([1-9]\d))\d{7}|M\d{9}|[A-Z]{3}\d{7})-(20[2-9][0-9]|2[1-9][0-9]{2}|[3-9][0-9]{3})(0[1-9]|1[0-2])(0[1-9]|[1-2][0-9]|3[0-1])-([0-9A-F]{6})-?([0-9A-F]{6})-([0-9A-F]{2})
      examples:
        - 1010000000-20200101-000000-000000-00
        - 1010000000-20200101-000000000000-00
    InvoiceRejectionSource:
      description: |
        Source of invoice rejection
        | Source | Description |
        | --- | --- |
        | SMARTKSEF | SmartKSEF. |
        | KSEF | Ksef service |  
      type: string
      format: enum
      enum:
        - SMARTKSEF
        - KSEF
    Reason:
      description: Invoice rejection reason
      type: string
      minLength: 1
      maxLength: 256
    Rejection:
      type: object
      description: Invoice rejection details (only applicable for rejected invoices).
      properties:
        source:
          $ref: '#/components/schemas/InvoiceRejectionSource'
        reason:
          $ref: '#/components/schemas/Reason'
      required:
        - source
        - reason
    PartyMinimalProjection:
      allOf:
        - properties:
            name:
              description: Name of company or private individual or any other entity.
              type: string
              minLength: 1
              maxLength: 512
            taxId:
              description: Tax ID
              type: string
              minLength: 1
              maxLength: 256
    ThirdPartiesMinimalProjection:
      description: Third parties.
      properties:
        factor:
          description: Invoice factor party.
          $ref: '#/components/schemas/PartyMinimalProjection'
        recipient:
          description: Invoice recipient party.
          $ref: '#/components/schemas/PartyMinimalProjection'
        primarySeller:
          description: |
            Primary seller. Most often there is no need to send this structure. 
            It's designed only for very unusual situations (after Subject transformations/acquisitions etc.). 
            For most common cases this property can be ignored.
          $ref: '#/components/schemas/PartyMinimalProjection'
        additionalBuyers:
          description: Additional customers party.
          type: array
          items:
            $ref: '#/components/schemas/PartyMinimalProjection'
        issuer:
          description: Invoice issuer party.
          $ref: '#/components/schemas/PartyMinimalProjection'
        payer:
          description: Invoice payer party.
          $ref: '#/components/schemas/PartyMinimalProjection'
        localGovernmentUnitRecipient:
          description: Invoice local government recipient party in case of using permissions model designed for local government units and VAT groups.
          $ref: '#/components/schemas/PartyMinimalProjection'
        localGovernmentUnitIssuer:
          description: Invoice local government issuer party in case of using permissions model designed for local government units and VAT groups.
          $ref: '#/components/schemas/PartyMinimalProjection'
        vatGroupMemberRecipient:
          description: Invoice VAT group recipient party in case of using permissions model designed for local government units and VAT groups.
          $ref: '#/components/schemas/PartyMinimalProjection'
        vatGroupMemberIssuer:
          description: Invoice VAT group issuer party in case of using permissions model designed for local government units and VAT groups.
          $ref: '#/components/schemas/PartyMinimalProjection'
        employee:
          description: |
            Invoice employee party.

            ⚠️ <span style="color:red">**Only applicable for FA(3).**</span>
          $ref: '#/components/schemas/PartyMinimalProjection'
        others:
          type: array
          items:
            $ref: '#/components/schemas/PartyMinimalProjection'
