    AttachmentId:
      description: Attachment Id.
      type: string
      format: uuid
      examples:
        - b06b860f-df95-4a83-8de5-6fc5080f9124
    AttachmentIds:
      description: |
        Attachment IDs. 
        **Attention!** Currently, attachments are an internal SmartKSeF solution and they are not populated to KSeF.
      type: array
      items:
        $ref: '#/components/schemas/AttachmentId'
    AbstractInvoice:
      properties:
        id:
          $ref: '#/components/schemas/InvoiceId'
        number:
          $ref: '#/components/schemas/InvoiceNumber'
        issueDate:
          type: string
          format: date
          example: '2022-02-14'
        issuePlace:
          type: string
          minLength: 1
          maxLength: 256
          example: Gliwice
        seller:
          $ref: '#/components/schemas/SupplierParty'
        buyer:
          $ref: '#/components/schemas/CustomerParty'
        thirdParties:
          $ref: '#/components/schemas/ThirdParties'
        empoweredParty:
          $ref: '#/components/schemas/EmpoweredParty'
        partiesRelatedFlag:
          description: |
            Should be set if there is some kind of relation between parties that meets rules described here: https://jpk.info.pl/jpk-v7/procedury-podatkowe-oznaczenia-jpk-v7m-v7k/
            It's also known as 'TP' flag.
          type: boolean
        selfBillingFlag:
          description: |
            Should be set to if invoice has been issued by buyer (only when buyer is authorized for that).  
            See: `art. 106d ust. 1  ustawy o VAT`
          type: boolean
        goodsDispatchNoteNumbers:
          description: Goods dispatch note (GDN) numbers.
          type: array
          maxItems: 1000
          items:
            type: string
            minLength: 1
            maxLength: 256
        settlement:
          $ref: '#/components/schemas/InvoiceSettlement'
        additionalInformation:
          description: |
            Additional information including new information required by law which currently doesn't have dedicated structures in scheme (for temporary solutions).
            Consists of keys and values, both between 1 and 240 characters long.
          maxProperties: 10000
          propertyNames:
            minLength: 1
            maxLength: 240
          additionalProperties:
            type: string
            minLength: 1
            maxLength: 240
          example:
            Preferred delivery hours: 17:00 - 20:00
        attachments:
          description: |
            Structured attachments.

            ⚠️ <span style="color:red">**Only applicable for FA(3). For FA(2) it's ignored.**</span>
          $ref: '#/components/schemas/Attachments'
        attachmentIds:
          $ref: '#/components/schemas/AttachmentIds'
      required:
        - type
        - id
        - number
        - issueDate
        - seller
        - buyer
    AbstractVatInvoice:
      allOf:
        - properties:
            type:
              $ref: '#/components/schemas/VatInvoiceType'
            id:
              $ref: '#/components/schemas/VatInvoiceId'
            number:
              description: Vat Invoice next number assigned within one or more series.
            issueDate:
              description: Vat Invoice issue date between 2006-01-01 and 2050-01-01. Past or present.
            issuePlace:
              description: Vat Invoice issue place.
            transaction:
              $ref: '#/components/schemas/Transaction'
            vat:
              $ref: '#/components/schemas/VatTotal'
          required:
            - type
            - issueDate
            - transaction
            - vat
        - $ref: '#/components/schemas/AbstractInvoice'
    StandardVatInvoice:
      description: Standard Vat Invoice
      allOf:
        - $ref: '#/components/schemas/AbstractVatInvoice'
        - properties:
            type:
              const: VAT_STANDARD
          required:
            - type
    InvoiceReferenceType:
      description: |
        Original Invoice Reference Type.
        | Type | Description |
        | - | -- |
        | SMARTKSEF | Reference to Invoice in SmartKSeF standard. |
        | KSEF | Reference to Invoice registered in KSeF. |
        | OUTSIDE_KSEF | Reference to Invoice that has not been registered in KSeF. |
      type: string
      format: enum
      enum:
        - SMARTKSEF
        - KSEF
        - OUTSIDE_KSEF
    AbstractInvoiceReference:
      description: |
        Original Vat Invoice key data required in Correctives.

        **ATTENTION** You should use `OriginalInvoiceOutsideKSeFReferenceKey` schema **only** if you are sure that original invoice was **not** registered in KSeF!
      properties:
        type:
          $ref: '#/components/schemas/InvoiceReferenceType'
      required:
        - type
    SmartKsefInvoiceReference:
      allOf:
        - $ref: '#/components/schemas/AbstractInvoiceReference'
        - properties:
            type:
              const: SMARTKSEF
            id:
              $ref: '#/components/schemas/InvoiceId'
          required:
            - type
            - number
    KsefInvoiceReference:
      allOf:
        - $ref: '#/components/schemas/AbstractInvoiceReference'
        - properties:
            type:
              const: OUTSIDE_KSEF
            ksefId:
              $ref: '#/components/schemas/InvoiceKsefId'
          required:
            - type
            - ksefId
    OutsideKsefInvoiceReference:
      allOf:
        - $ref: '#/components/schemas/AbstractInvoiceReference'
        - properties:
            type:
              const: OUTSIDE_KSEF
            number:
              $ref: '#/components/schemas/InvoiceNumber'
          required:
            - type
            - number
    InvoiceReference:
      properties:
        type:
          $ref: '#/components/schemas/InvoiceReferenceType'
      required:
        - type
      discriminator:
        propertyName: type
        mapping:
          SMARTKSEF: '#/components/schemas/SmartKsefInvoiceReference'
          KSEF: '#/components/schemas/KsefInvoiceReference'
          OUTSIDE_KSEF: '#/components/schemas/OutsideKsefInvoiceReference'
      anyOf:
        - $ref: '#/components/schemas/KsefInvoiceReference'
        - $ref: '#/components/schemas/OutsideKsefInvoiceReference'
        - $ref: '#/components/schemas/SmartKsefInvoiceReference'
    PrepaymentVatInvoice:
      description: Prepayment Vat Invoice.
      allOf:
        - $ref: '#/components/schemas/AbstractVatInvoice'
        - properties:
            type:
              const: VAT_PREPAYMENT
            prepaymentInvoices:
              description: |
                Prepayment Vat Invoice numbers (of all the Prepayment Invoices that were issued).
                It should be set for last Prepayment Invoice (when it documents fully paid Invoice but supply was not completed yet).
                See: `art. 106f ust. 4 ustawy o VAT`
              type: array
              minItems: 0
              maxItems: 100
              items:
                $ref: '#/components/schemas/InvoiceReference'
          required:
            - type
    FinalVatInvoice:
      description: |
        Final Vat Invoice. Should be issued after supply if Prepayment Invoice (one or more) was issued.  
        See: `art. 106f ust. 3 ustawy o VAT`
      allOf:
        - $ref: '#/components/schemas/AbstractVatInvoice'
        - type: object
          properties:
            type:
              const: VAT_FINAL
            prepaymentInvoices:
              description: References to prepayment Vat Invoices (of all Prepayment Vat Invoices which was issued).
              type: array
              minItems: 0
              maxItems: 100
              items:
                $ref: '#/components/schemas/InvoiceReference'
          required:
            - type
    SimplifiedVatInvoice:
      description: Simplified Vat Invoice.
      allOf:
        - $ref: '#/components/schemas/AbstractVatInvoice'
        - type: object
          properties:
            type:
              const: VAT_SIMPLIFIED
            buyer:
              $ref: '#/components/schemas/CustomerParty'
          required:
            - type
    VatInvoice:
      description: Vat Invoice by type.
      oneOf:
        - $ref: '#/components/schemas/StandardVatInvoice'
        - $ref: '#/components/schemas/PrepaymentVatInvoice'
        - $ref: '#/components/schemas/FinalVatInvoice'
        - $ref: '#/components/schemas/SimplifiedVatInvoice'
      discriminator:
        propertyName: type
        mapping:
          VAT_STANDARD: '#/components/schemas/StandardVatInvoice'
          VAT_PREPAYMENT: '#/components/schemas/PrepaymentVatInvoice'
          VAT_FINAL: '#/components/schemas/FinalVatInvoice'
          VAT_SIMPLIFIED: '#/components/schemas/SimplifiedVatInvoice'
    CorrectiveInvoiceId:
      description: |
        Corrective Invoice unique id.  
        Pattern explained: `CI-(invoice type)-(invoice issue date)-(uuid v4)`

        Invoice types:  
        `STD` - Standard  
        `PRP` - Prepayment  
        `FIN` - Final  
        `SPL` - Simplified  
        `PRD` - Period  

        Invoice issue date format is `yyyyMMdd`.
      type: string
      minLength: 52
      maxLength: 52
      pattern: (CI-(STD|PRP|FIN|SPL|PRD))-(\d{4})(0[1-9]|1[0-2])(0[1-9]|[12]\d|3[01])-[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}
      example: CI-PRD-20220222-6a2f41a3-c54c-fce8-32d2-0324e1c32e22
    CorrectiveEffectType:
      description: |
        Type of effect of the correction.  
        | Type | Description |
        | - | -- |
        | `ON_DATE_OF_ORIGINAL_INVOICE` | Correction effective on the date of the original invoice. |
        | `ON_DATE_OF_CORRECTIVE_INVOICE` | Correction effective on the date of issuing the corrective invoice. |
        | `ON_OTHER_DATE` | Correction effective on a different date, including the situation when the dates are different between different items. |
      type: string
      format: enum
      enum:
        - ON_DATE_OF_ORIGINAL_INVOICE
        - ON_DATE_OF_CORRECTIVE_INVOICE
        - ON_OTHER_DATE
    AbstractCorrectiveInvoice:
      allOf:
        - properties:
            type:
              $ref: '#/components/schemas/CorrectiveInvoiceType'
            id:
              $ref: '#/components/schemas/CorrectiveInvoiceId'
            number:
              description: Corrective Invoice next number assigned within one or more series.
            effectType:
              $ref: '#/components/schemas/CorrectiveEffectType'
            reason:
              description: Description of the reason for correcting the invoice.
              type: string
              minLength: 1
              maxLength: 256
            issueDate:
              description: Corrective Invoice issue date. Past or present.
            issuePlace:
              description: Corrective Invoice issue place.
            vat:
              description: Corrective Vat. Optional in the case of correcting data which has no impact on VAT.
              $ref: '#/components/schemas/VatTotal'
          required:
            - type
            - issueDate
        - $ref: '#/components/schemas/AbstractInvoice'
    AbstractOriginalInvoiceReference:
      description: |
        Original Vat Invoice key data required in Correctives.

        **ATTENTION** You should use `OriginalInvoiceOutsideKSeFReferenceKey` schema **only** if you are sure that original invoice was **not** registered in KSeF!
      properties:
        type:
          $ref: '#/components/schemas/InvoiceReferenceType'
      required:
        - type
    SmartKsefOriginalInvoiceReference:
      description: Original Invoice Reference by its SmartKSeF id.
      allOf:
        - $ref: '#/components/schemas/AbstractOriginalInvoiceReference'
        - properties:
            type:
              const: SMARTKSEF
            id:
              $ref: '#/components/schemas/VatInvoiceId'
          required:
            - type
            - id
    OfflineOriginalInvoiceReference:
      properties:
        number:
          description: Original Vat Invoice issue date.
          $ref: '#/components/schemas/InvoiceNumber'
        issueDate:
          description: Original Vat Invoice issue date.
          type: string
          format: date
          example: '2022-02-14'
      required:
        - number
        - issueDate
    SupplierPartyReference:
      allOf:
        - properties:
            identity:
              description: Supplier (seller) identity.
              $ref: '#/components/schemas/FullIdentity'
            address:
              $ref: '#/components/schemas/Address'
          required:
            - identity
            - address
    SimplifiedCustomerPartyReference:
      allOf:
        - properties:
            identity:
              $ref: '#/components/schemas/IdentifiedIdentity'
            address:
              $ref: '#/components/schemas/Address'
          required:
            - identity
    FullCustomerPartyReference:
      allOf:
        - properties:
            identity:
              $ref: '#/components/schemas/NamedIdentity'
            address:
              $ref: '#/components/schemas/Address'
          required:
            - identity
            - address
    CustomerPartyReference:
      anyOf:
        - $ref: '#/components/schemas/SimplifiedCustomerPartyReference'
        - $ref: '#/components/schemas/FullCustomerPartyReference'
    KsefOriginalInvoiceReference:
      description: Original Invoice Reference by its KSeF id.
      allOf:
        - $ref: '#/components/schemas/AbstractOriginalInvoiceReference'
        - $ref: '#/components/schemas/OfflineOriginalInvoiceReference'
        - properties:
            type:
              const: KSEF
            ksefId:
              $ref: '#/components/schemas/InvoiceKsefId'
            seller:
              description: |
                Seller data from original invoice. Required when this is a reason of correction (original data are incorrect). 
                **You cannot correct taxId this way!!!** The taxId from original invoice and corrective invoice has to be the same. To correct taxId you should create corrective invoice to 0 (zero) and issue new invoice with correct taxId.
              $ref: '#/components/schemas/SupplierPartyReference'
            buyer:
              description: |
                Buyer data from original invoice. Required when this is a reason of correction (original data are incorrect). 
                **You cannot correct buyers taxId this way!!!** The taxId from original invoice and corrective invoice has to be the same. To correct taxId you should create corrective invoice to 0 (zero) and issue new invoice with correct taxId.
              $ref: '#/components/schemas/CustomerPartyReference'
            additionalBuyers:
              description: |
                Additional buyers data from original invoice. Required when this is a reason of correction (original data are incorrect). 
                **You cannot correct additional buyers taxId this way!!!** The taxId from original invoice and corrective invoice has to be the same. To correct taxId you should create corrective invoice to 0 (zero) and issue new invoice with correct taxId.
              $ref: '#/components/schemas/FullCustomerPartyReference'
          required:
            - type
            - ksefId
    OutsideKsefOriginalInvoiceReference:
      description: Original Invoice Reference by its SmartKSeF id.
      allOf:
        - $ref: '#/components/schemas/AbstractOriginalInvoiceReference'
        - $ref: '#/components/schemas/OfflineOriginalInvoiceReference'
        - properties:
            type:
              const: OUTSIDE_KSEF
            seller:
              description: |
                Seller data from original invoice. Required when this is a reason of correction (original data are incorrect). 
                **You cannot correct taxId this way!!!** The taxId from original invoice and corrective invoice has to be the same. To correct taxId you should create corrective invoice to 0 (zero) and issue new invoice with correct taxId.
              $ref: '#/components/schemas/SupplierParty'
            buyer:
              description: |
                Buyer data from original invoice. Required when this is a reason of correction (original data are incorrect). 
                **You cannot correct buyers taxId this way!!!** The taxId from original invoice and corrective invoice has to be the same. To correct taxId you should create corrective invoice to 0 (zero) and issue new invoice with correct taxId.
              $ref: '#/components/schemas/CustomerParty'
            additionalBuyers:
              description: |
                Additional buyers data from original invoice. Required when this is a reason of correction (original data are incorrect). 
                **You cannot correct additional buyers taxId this way!!!** The taxId from original invoice and corrective invoice has to be the same. To correct taxId you should create corrective invoice to 0 (zero) and issue new invoice with correct taxId.
              $ref: '#/components/schemas/FullCustomerParty'
          required:
            - type
            - number
            - issueDate
    OriginalInvoiceReference:
      properties:
        type:
          $ref: '#/components/schemas/InvoiceReferenceType'
      required:
        - type
      discriminator:
        propertyName: type
        mapping:
          SMARTKSEF: '#/components/schemas/SmartKsefOriginalInvoiceReference'
          KSEF: '#/components/schemas/KsefOriginalInvoiceReference'
          OUTSIDE_KSEF: '#/components/schemas/OutsideKsefOriginalInvoiceReference'
      anyOf:
        - $ref: '#/components/schemas/SmartKsefOriginalInvoiceReference'
        - $ref: '#/components/schemas/KsefOriginalInvoiceReference'
        - $ref: '#/components/schemas/OutsideKsefOriginalInvoiceReference'
    CorrectiveMethod:
      description: |
        Corrective methods.
        | Type | Description |
        | - | -- |
        | BY_VOID | Method requires to specify two data projections - first is what we want to void (original state) and second is the expected state. Original state can be also represented just by id and in that case original data will be loaded dynamically. | 
        | BY_DIFF | Method requires to specify only the difference between original state and expected (e.g. originally transaction items had price 600, the expected state is to set prices to 400 so in that case -200 should be passed). |
      type: string
      format: enum
      enum:
        - BY_VOID
        - BY_DIFF
    AbstractCorrectiveTransaction:
      allOf:
        - properties:
            method:
              $ref: '#/components/schemas/CorrectiveMethod'
            amount:
              description: Corrective total transaction amount.
              $ref: '#/components/schemas/MoneyAmount'
            receiptFlag:
              description: |
                Should be set if receipt was issued for transaction by fiscal printer (Invoice is issued for transaction already documented by receipt).  
                It's also known as 'FP' flag.
              type: boolean
            splitPaymentFlag:
              description: |
                Should be set if product is on list of goods and services obligated to split payment (Annex 15).  
                Also known as `MPP` flag.  
                See: https://jpk.info.pl/jpk-v7/split-payment-lista-towarow-uslug-zalacznik-15/
              type: boolean
            exciseDutyRefundFlag:
              description: Excise duty contained in diesel fuel refund flag for farmers.
              type: boolean
          required:
            - method
        - $ref: '#/components/schemas/AbstractTransaction'
    CorrectiveItemOriginalReferenceByNumber:
      description: Reference to original item by providing item number. Allowed only for Corrective Invoices with `originalInvoiceRef.type = SMARTKSEF`.
      type: integer
      minimum: 1
    CorrectiveItemOriginalReference:
      description: |
        Reference to original transaction item.

        The corrective invoice using BY_VOID method requires reference to original (void) item to calculate the correction (balance between the original and new line / difference between "it was" and "it should be").

        If the original invoice was issued in SmartKSeF then it's enough to provide identifier of the void item (id of the invoice's line of original invoice in transaction.items.originalRef field).

        If the original invoice was issued out of SmartKSeF then it's necessary to provide details of the void line (details in transaction.items.originalRef element).
      anyOf:
        - $ref: '#/components/schemas/TransactionItem'
        - $ref: '#/components/schemas/CorrectiveItemOriginalReferenceByNumber'
    AbstractItem:
      properties:
        number:
          description: Sequenced next item number starting from 1.
          type: integer
          minimum: 1
        id:
          description: Universal unique **item** id.
          type: string
          minLength: 1
          maxLength: 40
        productCode:
          description: Internal product code (from sale system).
          type: string
          minLength: 1
          maxLength: 50
        supplyDate:
          description: |
            Supply date is the date when VAT becomes accountable. 
            Required when different items has different `supplyDate`.
          type: string
          format: date
          example: '2022-02-14'
        supplyPeriod:
          description: |
            Supply period eg. for continuous service.
            See: `art. 19a ust. 3 zdanie pierwsze i ust. 4 oraz ust. 5 pkt 4 ustawy o VAT`
          type: string
          format: period
          example: 2022-02-01/2022-02-28
        name:
          description: |
            Name of good or service.

            ⚠️ <span style="color:red">**For FA(2) it's truncated to 256 characters.**</span>
          type: string
          minLength: 1
          maxLength: 512
        price:
          description: Unit price (vat inclusive or exclusive depends on transaction `pricesVatScheme` - i.e. net unit price for `VAT_EXCLUSIVE`, gross unit price for `VAT_INCLUSIVE`).
          $ref: '#/components/schemas/MoneyAmount'
        discount:
          description: Discount to apply on price (only if price was not reduced already).
          $ref: '#/components/schemas/MoneyAmount'
        quantity:
          description: Quantity
          $ref: '#/components/schemas/Quantity'
        unitOfMeasure:
          description: Unit of measure.
          type: string
        amount:
          description: Total item amount ((price - discount) * quantity).
          $ref: '#/components/schemas/MoneyAmount'
        vat:
          description: VAT tax information.
          $ref: '#/components/schemas/Vat'
        exciseDutyAmount:
          description: Excise duty.
          $ref: '#/components/schemas/MoneyAmount'
        exchangeRate:
          description: |
            Exchange rate (if transaction currency is not national - `PLN`).

            ATTENTION! For Prepayment Invoice it has to be set at Transaction level (you can't use exchangeRate at item level).
          $ref: '#/components/schemas/Rate'
        gtin:
          description: |
            Global Trade Item Number.
            See: https://en.wikipedia.org/wiki/Global_Trade_Item_Number
          type: string
          minLength: 1
          maxLength: 20
        pkwiu:
          description: |
            Polish Classification of Goods and Services.  
            See: http://www.klasyfikacje.gofin.pl/wybor-pkwiu.html
          type: string
          minLength: 1
          maxLength: 50
        cn:
          description: |
            Combined nomenclature.  
            See: http://www.klasyfikacje.gofin.pl/wybor-cn.html
          type: string
          minLength: 1
          maxLength: 50
        pkob:
          description: |
            Polish Classification of Construction Objects.  
            See: http://www.klasyfikacje.gofin.pl/pkob/8,0.html
          type: string
          minLength: 1
          maxLength: 50
        gtu:
          $ref: '#/components/schemas/GTUCode'
        splitPaymentFlag:
          description: |
            Should be set if product is on list of goods and services obligated to split payment (Annex 15).  
            Also known as `MPP` flag.  
            See: https://jpk.info.pl/jpk-v7/split-payment-lista-towarow-uslug-zalacznik-15/
          type: boolean
        spvIssueFlag:
          description: |
            Should be set if product is single purpose voucher issue.  
            Also known as `B_SPV` flag.
          type: boolean
        spvSupplyFlag:
          description: |
            Should be set if product is representing act of supplying single purpose voucher.  
            Also known as `B_SPV_DOSTAWA` flag.
          type: boolean
        mpvFeeFlag:
          description: |
            Should be set if product is representing act of accounting fee for multi purpose voucher by intermediary.  
            Also known as `B_MPV_PROWIZJA` flag.
          type: boolean
        importFlag:
          description: |
            Should be set if product was imported from extra-Community and sold in intra-Community transaction.  
            Also known as `I_42` flag.
          type: boolean
        reimportFlag:
          description: |
            Should be set if product was imported from extra-Community and send to another extra-Community country in which has been changed (e.g. improved/assembled/modified/repaired etc)  
            and after that send back and sold in intra-Community transaction.  
            Also known as `I_63` flag.
          type: boolean
        intermediaryPartySimplifiedProcedureFlag:
          description: |
            Should be set if product is sold by second party in simplified tripartite transaction.  
            Also known as `TT_D` flag.  
            See: `art. 22 ust. 2d ustawy o VAT`.
          type: boolean
        additionalInformation:
          description: Additional information.
          maxProperties: 100
          propertyNames:
            minLength: 1
            maxLength: 240
          additionalProperties:
            type: string
            minLength: 1
            maxLength: 240
      required:
        - number
        - name
        - price
        - quantity
        - unitOfMeasure
        - amount
        - vat
    AbstractCorrectiveItem:
      allOf:
        - $ref: '#/components/schemas/AbstractItem'
    CorrectiveItemByVoid:
      description: |
        Contains two data projections - first is what we want to void (original state) and second is the expected state.  
        Original state can be also represented just by id and in that case original data will be loaded dynamically.
      allOf:
        - properties:
            originalRef:
              $ref: '#/components/schemas/CorrectiveItemOriginalReference'
        - $ref: '#/components/schemas/AbstractCorrectiveItem'
      required:
        - originalRef
    CorrectiveItemsByVoid:
      type: array
      items:
        $ref: '#/components/schemas/CorrectiveItemByVoid'
    CorrectiveTransactionByVoid:
      allOf:
        - $ref: '#/components/schemas/AbstractCorrectiveTransaction'
        - properties:
            method:
              const: BY_VOID
            items:
              $ref: '#/components/schemas/CorrectiveItemsByVoid'
          required:
            - method
    CorrectiveItemByDiff:
      description: Contains difference between original item and expected state (e.g. if original item amount is 400 but should be 600 the diff is 200 and this value should be passed).
      allOf:
        - $ref: '#/components/schemas/AbstractCorrectiveItem'
    CorrectiveItemsByDiff:
      type: array
      items:
        $ref: '#/components/schemas/CorrectiveItemByDiff'
    CorrectiveTransactionByDiff:
      allOf:
        - $ref: '#/components/schemas/AbstractCorrectiveTransaction'
        - properties:
            method:
              const: BY_DIFF
            items:
              $ref: '#/components/schemas/CorrectiveItemsByDiff'
          required:
            - method
    CorrectiveTransaction:
      description: Corrective transaction.
      discriminator:
        propertyName: method
        mapping:
          BY_VOID: '#/components/schemas/CorrectiveTransactionByVoid'
          BY_DIFF: '#/components/schemas/CorrectiveTransactionByDiff'
      anyOf:
        - $ref: '#/components/schemas/CorrectiveTransactionByVoid'
        - $ref: '#/components/schemas/CorrectiveTransactionByDiff'
    AbstractSingleCorrectiveInvoice:
      description: Corrective Invoice for single Vat Invoice.
      allOf:
        - $ref: '#/components/schemas/AbstractCorrectiveInvoice'
        - properties:
            originalInvoiceRef:
              $ref: '#/components/schemas/OriginalInvoiceReference'
            correctiveNumber:
              description: Corrective Invoice number, if the reason (or one of the reasons) for correction is to fix the original Invoice number.
              $ref: '#/components/schemas/InvoiceNumber'
            transaction:
              $ref: '#/components/schemas/CorrectiveTransaction'
          required:
            - originalInvoiceRef
    StandardCorrectiveInvoice:
      description: Standard Corrective Invoice
      allOf:
        - $ref: '#/components/schemas/AbstractSingleCorrectiveInvoice'
        - properties:
            type:
              const: CORRECTIVE_STANDARD
          required:
            - type
    PrepaymentCorrectiveInvoice:
      description: Prepayment Corrective Invoice.
      allOf:
        - $ref: '#/components/schemas/AbstractSingleCorrectiveInvoice'
        - type: object
          properties:
            type:
              const: CORRECTIVE_PREPAYMENT
            prepaymentInvoices:
              description: |
                Prepayment Vat Invoices 
                It should be set for last Prepayment Invoice (when it documents fully paid Invoice but supply was not completed yet).
                See: `art. 106f ust. 4 ustawy o VAT`
              type: array
              items:
                $ref: '#/components/schemas/InvoiceReference'
          required:
            - type
    FinalCorrectiveInvoice:
      description: Final Corrective Invoice.
      allOf:
        - $ref: '#/components/schemas/AbstractSingleCorrectiveInvoice'
        - properties:
            type:
              const: CORRECTIVE_FINAL
            prepaymentInvoices:
              description: |
                Prepayment Vat Invoices references (if correction is required)
                It should be set for last Prepayment Invoice (when it documents fully paid Invoice but supply was not completed yet).
                See: `art. 106f ust. 4 ustawy o VAT`
              type: array
              items:
                $ref: '#/components/schemas/InvoiceReference'
          required:
            - type
    SimplifiedCorrectiveInvoice:
      description: Simplified Corrective Invoice.
      allOf:
        - $ref: '#/components/schemas/AbstractSingleCorrectiveInvoice'
        - properties:
            type:
              const: CORRECTIVE_SIMPLIFIED
            buyer:
              $ref: '#/components/schemas/CustomerParty'
          required:
            - type
            - buyer
    OriginalInvoicesReference:
      description: References to Original Invoices.
      type: array
      items:
        minItems: 1
        maxItems: 50000
        $ref: '#/components/schemas/OriginalInvoiceReference'
    PeriodCorrectiveInvoice:
      description: Corrective Invoice for period. Can refer to multiple Vat Invoices.
      allOf:
        - $ref: '#/components/schemas/AbstractCorrectiveInvoice'
        - properties:
            type:
              const: CORRECTIVE_PERIOD
            periodDescription:
              description: |
                Corrected period description. 
                The period to which the discount or reduction is granted, if the taxpayer grants the discount or price reduction in relation to the supply of goods or services made or provided to one recipient in a given period.
                See: `art. 106j ust. 3 ustawy o VAT`.
              type: string
              example: First quarter of 2022.
            originalInvoiceRefs:
              description: Original Vat Invoice references (ids or reference keys).
              $ref: '#/components/schemas/OriginalInvoicesReference'
            amount:
              description: Corrective total amount.
              $ref: '#/components/schemas/MoneyAmount'
            currencyCode:
              description: |
                Currency code.

                ⚠️ <span style="color:red">**ATTENTION!** The `currencyCode` is nullable only for backward compatibility and the default value is `PLN`.</span>
              $ref: '#/components/schemas/CurrencyCode'
              default: PLN
            exchangeRate:
              description: Exchange rate if currencyCode is set.
              $ref: '#/components/schemas/Rate'
            vat:
              description: Corrective Vat.
              $ref: '#/components/schemas/VatTotal'
            items:
              description: Corrective Invoice items for period. Optional when applies on all items of all Invoices for given period.
              type: array
              items:
                description: Corrective Invoice item for period.
                properties:
                  number:
                    description: Sequenced next item number starting from 1.
                    type: integer
                    minimum: 1
                  id:
                    description: Universal unique **item** id.
                    type: string
                    minLength: 1
                    maxLength: 40
                  name:
                    description: |
                      Name of good or service.

                      ⚠️ <span style="color:red">**For FA(2) it's truncated to 256 characters.**</span>
                    type: string
                    minLength: 1
                    maxLength: 512
                  quantity:
                    description: Quantity
                    $ref: '#/components/schemas/Quantity'
                  unitOfMeasure:
                    description: Unit of measure.
                    type: string
                  gtin:
                    description: Global Trade Item Number.
                    type: string
                  pkwiu:
                    description: |
                      Polish Classification of Goods and Services.  
                      See: http://www.klasyfikacje.gofin.pl/wybor-pkwiu.html
                    type: string
                  cn:
                    description: |
                      Combined nomenclature.  
                      See: http://www.klasyfikacje.gofin.pl/wybor-cn.html
                    type: string
                  pkob:
                    description: |
                      Polish Classification of Construction Objects.  
                      See: http://www.klasyfikacje.gofin.pl/pkob/8,0.html
                    type: string
                  additionalInformation:
                    description: Additional information.
                    additionalProperties:
                      type: string
                required:
                  - number
                  - name
          required:
            - type
            - methodType
            - periodDescription
            - originalInvoiceRefs
            - amount
            - vat
    CorrectiveInvoice:
      description: Corrective Invoice by type.
      oneOf:
        - $ref: '#/components/schemas/StandardCorrectiveInvoice'
        - $ref: '#/components/schemas/PrepaymentCorrectiveInvoice'
        - $ref: '#/components/schemas/FinalCorrectiveInvoice'
        - $ref: '#/components/schemas/SimplifiedCorrectiveInvoice'
        - $ref: '#/components/schemas/PeriodCorrectiveInvoice'
      discriminator:
        propertyName: type
        mapping:
          CORRECTIVE_STANDARD: '#/components/schemas/StandardCorrectiveInvoice'
          CORRECTIVE_PREPAYMENT: '#/components/schemas/PrepaymentCorrectiveInvoice'
          CORRECTIVE_FINAL: '#/components/schemas/FinalCorrectiveInvoice'
          CORRECTIVE_SIMPLIFIED: '#/components/schemas/SimplifiedCorrectiveInvoice'
          CORRECTIVE_PERIOD: '#/components/schemas/PeriodCorrectiveInvoice'
    InvoiceV2:
      oneOf:
        - $ref: '#/components/schemas/VatInvoice'
        - $ref: '#/components/schemas/CorrectiveInvoice'
    InvoiceXml:
      description: |
        Final Vat Invoice. Should be issued after supply if Prepayment Invoice (one or more) was issued.  
        See: `art. 106f ust. 3 ustawy o VAT`
      type: object
      properties:
        Faktura:
          description: KSeF plain XML (in supported XML format like `FA (2)`, `FA (3)` etc.)
          name: Faktura
    AbstractInvoiceProjection:
      properties:
        id:
          $ref: '#/components/schemas/InvoiceId'
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        previews:
          $ref: '#/components/schemas/Previews'
        ksefState:
          $ref: '#/components/schemas/SimpleKsefState'
      required:
        - id
        - status
        - previews
    Invoice:
      oneOf:
        - $ref: '#/components/schemas/VatInvoice'
        - $ref: '#/components/schemas/CorrectiveInvoice'
      x-tags:
        - Invoices
    InvoiceRepresentationProjection:
      description: Invoice representation projection.
      allOf:
        - $ref: '#/components/schemas/AbstractInvoiceProjection'
        - properties:
            createdAt:
              description: Invoice created date-time in SmartKsef
              type: string
              format: date-time
              example: '2022-08-25T08:00:00Z'
            submissionDateTime:
              description: Invoice sent to KSeF date-time (based on KSeF's data)
              type: string
              format: date-time
              example: '2022-08-25T07:59:57Z'
            ksefId:
              $ref: '#/components/schemas/InvoiceKsefId'
            registrationDateTime:
              description: Invoice registration date-time (based on KSeF's data)
              type: string
              format: date-time
              example: '2022-08-25T08:00:00Z'
            confirmationDateTime:
              description: Invoice confirmation (UPO) date-time (based on KSeF's data)
              type: string
              format: date-time
              example: '2022-08-25T08:00:00Z'
            verificationCodes:
              $ref: '#/components/schemas/InvoiceVerificationCodes'
            rejection:
              $ref: '#/components/schemas/Rejection'
        - $ref: '#/components/schemas/Invoice'
        - examples:
            - $ref: ../../../examples/InvoiceRepresentationProjectionExamples.yaml
    NotFoundError:
      description: Resource not found.
      allOf:
        - $ref: '#/components/schemas/AbstractClientError'
        - properties:
            type:
              const: NOT_FOUND
            status:
              const: 404
    ConflictError:
      description: Resource conflict (e.g. resource with given id already exists, resource you are trying to update has been changed parallely (version you changed was not fresh)).
      allOf:
        - $ref: '#/components/schemas/AbstractClientError'
        - properties:
            type:
              const: CONFLICT
            status:
              const: 409
    IncorrectDataError:
      description: Request data (paths, query params, headers or request body) provided by client are incorrect (e.g. provided original Invoice reference does not exist).
      allOf:
        - $ref: '#/components/schemas/AbstractClientError'
        - properties:
            type:
              const: INCORRECT_DATA
            status:
              const: 422
    InvoiceBatch:
      properties:
        invoices:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/Invoice'
    InvoiceRepresentationProjections:
      type: array
      items:
        anyOf:
          - $ref: '#/components/schemas/InvoiceRepresentationProjection'
    ClientError:
      anyOf:
        - $ref: '#/components/schemas/UnauthorizedError'
        - $ref: '#/components/schemas/ForbiddenError'
        - $ref: '#/components/schemas/IncorrectStructureError'
        - $ref: '#/components/schemas/IncorrectDataError'
        - $ref: '#/components/schemas/NotFoundError'
        - $ref: '#/components/schemas/ConflictError'
      discriminator:
        propertyName: type
        mapping:
          UNAUTHORIZED: '#/components/schemas/UnauthorizedError'
          FORBIDDEN: '#/components/schemas/ForbiddenError'
          INCORRECT_STRUCTURE: '#/components/schemas/IncorrectStructureError'
          INCORRECT_DATA: '#/components/schemas/IncorrectDataError'
          NOT_FOUND: '#/components/schemas/NotFoundError'
          CONFLICT: '#/components/schemas/ConflictError'
    InvoiceAssignmentRequest:
      description: |
        Manual invoice assignment request.

        Allows to manually set the assignment of an invoice, overriding the result of the classification engine.

        When `status` is `ASSIGNED`, the `destinationId` is required.
        When `status` is `UNASSIGNED` or `REJECTED`, the `destinationId` must not be provided.
      type: object
      properties:
        type:
          type: string
          format: enum
          enum:
            - MANUAL
          description: Assignment type. Must be `MANUAL` for this operation.
        status:
          $ref: '#/components/schemas/InvoiceAssignmentStatus'
        description:
          type: string
          description: Optional description of the assignment (e.g., reason for rejection or manual override).
          maxLength: 255
        destinationId:
          type: string
          format: uuid
          description: |
            Unique identifier of the external system where the invoice is assigned.

            To get list of available external systems (which are used as destinationId), contact our support team.

            Required when `status` is `ASSIGNED`. Must not be provided for `UNASSIGNED` or `REJECTED` statuses.
          minLength: 36
          maxLength: 36
      required:
        - type
        - status
    PurchaseInvoiceMinimalProjection:
      properties:
        id:
          $ref: '#/components/schemas/InvoiceId'
        ksefId:
          $ref: '#/components/schemas/InvoiceKsefId'
        registrationDateTime:
          description: KSeF registration datetime.
          type: string
          format: date-time
      required:
        - id
        - ksefId
        - registrationDateTime
    PurchaseInvoiceMinimalProjections:
      type: array
      items:
        $ref: '#/components/schemas/PurchaseInvoiceMinimalProjection'
    AbstractRegisteredInvoice:
      properties:
        id:
          $ref: '#/components/schemas/InvoiceId'
        ksefId:
          $ref: '#/components/schemas/InvoiceKsefId'
        registrationDateTime:
          description: KSeF registration datetime.
          type: string
          format: date-time
      required:
        - id
        - ksefId
        - registrationDateTime
    ValidRegisteredInvoice:
      type: object
      description: Valid invoice registered at KSeF.
      allOf:
        - $ref: '#/components/schemas/AbstractRegisteredInvoice'
        - properties:
            validation:
              type: string
              const: VALID
          required:
            - validation
        - $ref: '#/components/schemas/Invoice'
    InvalidRegisteredInvoice:
      type: object
      description: Invalid invoice registered at KSeF.
      allOf:
        - $ref: '#/components/schemas/AbstractRegisteredInvoice'
        - properties:
            validation:
              const: INVALID
          required:
            - validation
      example:
        id: CI-PRD-20230101-6a2f41a3-c54c-fce8-32d2-0324e1c32e22
        ksefId: 1234567890-20230101-000000-000000-00
        registrationDateTime: '2023-01-01T14:15:22Z'
        validation: INVALID
    ValidationStatus:
      description: Invoice validation status.
      type: string
      enum:
        - VALID
        - INVALID
    AbstractValidatedInvoice:
      properties:
        validation:
          $ref: '#/components/schemas/ValidationStatus'
      required:
        - validation
      oneOf:
        - $ref: '#/components/schemas/ValidRegisteredInvoice'
        - $ref: '#/components/schemas/InvalidRegisteredInvoice'
    ExternalInvoiceId:
      description: External Invoice unique id generated by client side that identifies import request that allows for check status of particular External Invoice import status.
      type: string
      format: uuid
    CreateExternalInvoice:
      description: External Invoice data.
      properties:
        id:
          $ref: '#/components/schemas/ExternalInvoiceId'
        ksefId:
          $ref: '#/components/schemas/InvoiceKsefId'
        hash:
          description: External Invoice hash (SHA-256 Base64 encoded).
          type: string
          format: byte
          minLength: 44
          maxLength: 44
        number:
          description: External Invoice number.
          $ref: '#/components/schemas/InvoiceNumber'
        buyerTaxId:
          description: External Invoice buyer tax identifier (can be null for e.g. B2C Invoice).
          $ref: '#/components/schemas/Identifier'
        amount:
          description: External Invoice amount.
          $ref: '#/components/schemas/MoneyAmount'
        importTaxId:
          description: Tax identifier of legal entity to which invoice should be assigned (the legal entity must exist in SmartKSeF).
          type: string
          minLength: 10
          maxLength: 10
        description:
          description: Additional description (for internal purposes). Can be used to add description for other users that may be helpful to recognize source/reason for downloading particular external Invoice.
          type: string
          minLength: 1
          maxLength: 255
      required:
        - id
        - ksefId
        - hash
        - number
        - amount
        - importTaxId
    ExternalInvoiceStatus:
      description: |
        | Type | Description |
        | - | --- |
        | ACCEPTED | External Invoice has been accepted and it's waiting for download. |
        | IMPORTED | External Invoice has been successfully imported. It's final status. |
        | REJECTED | External Invoice can't be downloaded, check the reason. It's final status. |
      type: string
      format: enum
      enum:
        - ACCEPTED
        - IMPORTED
        - REJECTED
    AbstractExternalInvoice:
      description: External Invoice create data.
      allOf:
        - properties:
            status:
              $ref: '#/components/schemas/ExternalInvoiceStatus'
          required:
            - status
        - $ref: '#/components/schemas/CreateExternalInvoice'
    AcceptedExternalInvoice:
      description: External Invoice has been accepted and it's waiting for download.
      allOf:
        - $ref: '#/components/schemas/AbstractExternalInvoice'
        - properties:
            status:
              const: ACCEPTED
          required:
            - status
    ImportedExternalInvoice:
      allOf:
        - $ref: '#/components/schemas/AbstractExternalInvoice'
        - properties:
            status:
              const: IMPORTED
            invoiceId:
              description: SmartKSeF Invoice id to use in `/invoices` API.
              $ref: '#/components/schemas/InvoiceId'
            importDateTime:
              description: Date and time when External Invoice has been imported.
              type: string
              format: date-time
          required:
            - status
            - invoiceId
            - importDateTime
    RejectedExternalInvoice:
      allOf:
        - $ref: '#/components/schemas/AbstractExternalInvoice'
        - properties:
            status:
              const: REJECTED
            source:
              type: string
              format: enum
              enum:
                - KSEF
                - SMARTKSEF
            reason:
              description: Rejection reason.
              type: string
          required:
            - status
            - source
            - reason
    ExternalInvoice:
      oneOf:
        - $ref: '#/components/schemas/AcceptedExternalInvoice'
        - $ref: '#/components/schemas/ImportedExternalInvoice'
        - $ref: '#/components/schemas/RejectedExternalInvoice'
      discriminator:
        propertyName: status
        mapping:
          ACCEPTED: '#/components/schemas/AcceptedExternalInvoice'
          IMPORTED: '#/components/schemas/ImportedExternalInvoice'
          REJECTED: '#/components/schemas/RejectedExternalInvoice'
      x-tags:
        - External Invoices
    CreateExternalInvoices:
      description: Multiple (array) create External Invoices data.
      type: array
      minItems: 1
      maxItems: 100
      items:
        $ref: '#/components/schemas/CreateExternalInvoice'
    X-Total-Count:
      description: Total number of elements available.
      required: true
      schema:
        type: integer
        minimum: 0
    ExternalInvoices:
      description: Multiple (array) create External Invoices data.
      type: array
      minItems: 1
      maxItems: 100
      items:
        $ref: '#/components/schemas/ExternalInvoice'
    AttachmentIdBoxed:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/AttachmentId'
      required:
        - id
    UnprocessableEntityError:
      description: Unprocessable entity.
      allOf:
        - properties:
            type:
              const: UNPROCESSABLE_ENTITY
            status:
              const: 422
        - $ref: '#/components/schemas/AbstractClientError'
    ActuatorHealthDetails:
      type: object
      description: Additional details about the health status.
      properties:
        components:
          type: object
          description: Detailed health status of individual components.
          additionalProperties:
            type: object
            description: Health details of each component.
    Error:
      anyOf:
        - $ref: '#/components/schemas/ClientError'
        - $ref: '#/components/schemas/ServerError'
      required:
        - type
      properties:
        type:
          type: string
    KsefAvailableApi:
      properties:
        status:
          type: string
          const: AVAILABLE
      required:
        - status
    KsefUnavailableApi:
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier.
        status:
          type: string
          const: UNAVAILABLE
        disruptionType:
          type: string
          enum:
            - NORMAL
            - COMPLETE
            - PLANNED
          description: |
            | Type | Description |
            | - | -- |
            | NORMAL | unplanned disruption in communication (healthcheck failed) |
            | COMPLETE| complete disruption in communication (e.g disaster) |
            | PLANNED | planned communication disruption (from Ksef API) |
        disruptionDescription:
          type: string
        startAt:
          type: string
          format: date-time
          description: Start date-time of the disruption. If not provided, the current date-time is used.
        endAt:
          type: string
          format: date-time
          description: End date-time of the disruption. If not provided, disruption is considered active until turned off.
      required:
        - id
        - status
        - disruptionType
        - disruptionDescription
    KsefStateApi:
      oneOf:
        - $ref: '#/components/schemas/KsefAvailableApi'
        - $ref: '#/components/schemas/KsefUnavailableApi'
      discriminator:
        propertyName: status
        mapping:
          AVAILABLE: '#/components/schemas/KsefAvailableApi'
          UNAVAILABLE: '#/components/schemas/KsefUnavailableApi'
      examples:
        ksefAvailableApi:
          summary: KSEF service is available.
          value:
            status: AVAILABLE
        ksefUnavailableApi:
          summary: KSEF service is unavailable due to a planned disruption.
          value:
            id: 1
            disruptionType: NORMAL
            disruptionDescription: test
            startAt: '2025-09-03T12:34:00.2509231+02:00'
            endAt: '2025-09-03T12:34:00.2509231+02:00'
            status: UNAVAILABLE
    PartyType:
      description: |
        The `party` parameter represents information about context how legal entity is related to Invoice.
        - `SELLER`: Invoices where the legal entity is the seller.
        - `BUYER`: Invoices where the legal entity is the buyer.
        - `THIRD`: Invoices where the legal entity is a third party (neither seller nor buyer).
        - `EXTERNAL`: Invoices where the legal entity does not appear in any role on the invoice.
      type: string
      enum:
        - SELLER
        - BUYER
        - THIRD
        - EXTERNAL
    AbstractEvent:
      properties:
        id:
          $ref: '#/components/schemas/InvoiceId'
        status:
          $ref: '#/components/schemas/InvoiceStatus'
        party:
          $ref: '#/components/schemas/PartyType'
        taxId:
          description: |
            Tax identification number of the party.
          type: string
          example: '5252535950'
          pattern: '[1-9]((\d[1-9])|([1-9]\d))\d{7}'
        sourceSystem:
          description: Source system label
          type: string
          minLength: 1
          maxLength: 256
    InvoiceAccepted:
      description: |
        Invoice has been accepted by SmartKSeF.

        ⚠️ <span style="color:red">**Webhook implementation for this event is not available yet!**</span>
      allOf:
        - $ref: '#/components/schemas/AbstractEvent'
        - properties:
            status:
              const: ACCEPTED
            acceptanceDateTime:
              description: Acceptace date time.
              type: string
              format: date-time
            number:
              $ref: '#/components/schemas/InvoiceNumber'
          required:
            - id
            - status
            - party
            - taxId
            - sourceSystem
            - acceptanceDateTime
            - number
    InvoiceSent:
      description: |
        Invoice has been sent to KSeF.
      allOf:
        - $ref: '#/components/schemas/AbstractEvent'
        - properties:
            status:
              const: SENT
            submissionDateTime:
              description: Submission date time which is issue date for structured Invoices (date and time when the Invoice has been sent to KSeF).
              type: string
              format: date-time
            number:
              $ref: '#/components/schemas/InvoiceNumber'
          required:
            - id
            - status
            - party
            - taxId
            - sourceSystem
            - submissionDateTime
            - number
    InvoiceRegistered:
      description: Invoice correctly registered in KSeF.
      allOf:
        - $ref: '#/components/schemas/AbstractEvent'
        - properties:
            status:
              const: REGISTERED
            party:
              $ref: '#/components/schemas/PartyType'
            ksefId:
              $ref: '#/components/schemas/InvoiceKsefId'
            submissionDateTime:
              description: Submission date time which is issue date for structured Invoices (date and time when the Invoice has been sent to KSeF).
              type: string
              format: date-time
            registrationDateTime:
              description: Registration date time which represent the moment when Invoice is treated as delivered to customer for structured Invoices (date and time when KSeF processed invoice and generated ksefId)..
              type: string
              format: date-time
            number:
              $ref: '#/components/schemas/InvoiceNumber'
            verificationUrl:
              description: Url directing to tax authorities gov.pl page that allows Invoice receivers validate if it's valid invoice. Should be presented as QR Code on invoice visualization. Available for status REGISTERED.
              type: string
              minLength: 1
              maxLength: 256
            invoice:
              description: Invoice data (for Invoices received from KSeF).
              oneOf:
                - $ref: '#/components/schemas/VatInvoice'
                - $ref: '#/components/schemas/CorrectiveInvoice'
          required:
            - id
            - status
            - party
            - taxId
            - sourceSystem
            - ksefId
            - submissionDateTime
            - registrationDateTime
            - number
            - verificationUrl
    InvoiceConfirmed:
      description: |
        Invoice has been confirmed what means we have received UPO from KSeF.

        ⚠️ <span style="color:red">**Webhook implementation for this event is not available yet!**</span>
      allOf:
        - $ref: '#/components/schemas/AbstractEvent'
        - properties:
            status:
              const: CONFIRMED
            submissionDateTime:
              description: Submission date time which is issue date for structured Invoices (date and time when the Invoice has been sent to KSeF).
              type: string
              format: date-time
            registrationDateTime:
              description: Registration date time which represent the moment when Invoice is treated as delivered to customer for structured Invoices (date and time when KSeF processed invoice and generated ksefId).
              type: string
              format: date-time
            confirmationDateTime:
              description: Confirmation date time which represent the moment when we received the UPO from KSeF.
              type: string
              format: date-time
            number:
              $ref: '#/components/schemas/InvoiceNumber'
            verificationUrl:
              description: Url directing to tax authorities gov.pl page that allows Invoice receivers validate if it's valid invoice. Should be presented as QR Code on invoice visualization. Available for status REGISTERED.
              type: string
              minLength: 1
              maxLength: 256
            upoId:
              description: Identifier of official document that confirms KSeF received Invoice.
              type: string
          required:
            - id
            - status
            - party
            - taxId
            - sourceSystem
            - submissionDateTime
            - registrationDateTime
            - confirmationDateTime
            - number
            - verificationUrl
            - upoId
    InvoiceRejected:
      description: Invoice has been rejected.
      allOf:
        - $ref: '#/components/schemas/AbstractEvent'
        - properties:
            status:
              const: REJECTED
            source:
              description: Source of rejection.
              type: string
              format: enum
              enum:
                - SMARTKSEF
                - KSEF
              example: KSEF
            reason:
              example: '9101 : Nieprawidłowy dokument.'
              type: string
              description: |
                Contains detailed reason about rejection. Depending on source of rejection:

                  SMARTKSEF possible reasons:

                    TRIES_LIMIT_EXCEEDED - exceeded the limit of tries

                    MANUAL - rejected by manual action (someone marked Invoice as rejected from hand)

                  KSEF possible reasons (list provided by KSeF):
                    <details>
                      <summary>Reasons explained</summary>

                      9101 : Nieprawidłowy dokument.
                      9102 : Brak podpisu.
                      9103 : Przekroczona liczba [-1] dozwolonych podpisów [-1].
                      9104 : Niewystarczająca liczba [-1] wymaganych podpisów [-1].
                      9105 : Nieprawidłowa treść podpisu.
                      9106 : Nieprawidłowa liczba referencji podpisu [STRING].
                      9107 : Niezgodność lub nieprawidłowa referencja podpisanych danych [STRING].
                      9108 : Nieprawidłowa liczba danych referencji podpisu [STRING].
                      9109 : Brak danych referencji podpisu [STRING].
                      9110 : Brak referencji do danych podpisu [STRING].
                      20001 : Niedozwolone sekcje dokumentu.
                      20002 : Niedozwolone sekcje dokumentu [DTD].
                      20003 : Niedozwolone sekcje dokumentu [CDATA].
                      20004 : Nieprawidłowo zakodowana treść (base64).
                      20005 : Nieprawidłowo zaszyfrowana treść.
                      20006 : Nieprawidłowy format czasu.
                      21001 : Nieczytelna treść.
                      21111 : Nieprawidłowe wyzwanie autoryzacyjne.
                      21112 : Nieprawidłowy czas tokena.
                      21116 : Nieprawidłowy token.
                      21121 : Limit żądań osiągnięty.
                      21133 : Brak treści faktury żądania wysyłki faktury.
                      21135 : Brak definicji pakietu.
                      21136 : Brak definicji szyfrowania.
                      21137 : Brak sygnatury pliku faktury.
                      21139 : Brak sygnatury pliku pakietu.
                      21140 : Brak sygnatury pakietu.
                      21141 : Brak listy części pakietu.
                      21143 : Nieprawidłowy typ klucza szyfrującego.
                      21144 : Nieprawidłowy typ wektora inicjalizacyjnego.
                      21145 : Nieprawidłowy typ dokumentu.
                      21146 : Nieprawidłowy typ żądania wysyłki faktury.
                      21147 : Sprzeczny typ żądania wysyłki faktury.
                      21148 : Brak numeru referencyjnego.
                      21149 : Brak sesji.
                      21151 : Sesja wsadowa nieaktywna.
                      21153 : Sesja interaktywna nieaktywna.
                      21154 : Sesja interaktywna zakończona.
                      21156 : Nieprawidłowa definicja części pakietu.
                      21157 : Nieprawidłowy rozmiar części pakietu.
                      21158 : Nieprawidłowy skrót części pakietu.
                      21159 : Nieprawidłowy podpis.
                      21160 : Nieprawidłowy kontekst [STRING].
                      21162 : Nieprawidłowe żądanie [STRING].
                      21164 : Faktura o podanym identyfikatorze nie istnieje.
                      21168 : Poświadczenia o podanym identyfikatorze nie istnieją.
                      21169 : Brak autoryzacji lub faktura o podanym identyfikatorze nie istnieje.
                      21170 : Sesja interaktywna wygasła.
                      21171 : Brak tokena sesyjnego.
                      21172 : Pusta treść żądania.
                      21173 : Brak sesji o wskazanym numerze referencyjnym.
                      21174 : Brak nazwy części.
                      21175 : Wynik zapytania o podanym identyfikatorze nie istnieje.
                      21176 : Duplikat faktury w kontekście sesji.
                      21177 : Przekroczona maksymalna liczba wyników [-1]. Doprecyzuj kryteria.
                      21178 : Nie znaleziono UPO dla podanych kryteriów
                      21179 : Konflikt wersji żądania i odpowiedzi.
                      21180 : Nieprawidłowe żądanie.
                      21204 : Pakiet nie może być zduplikowany.
                      21205 : Pakiet nie może być pusty.
                      21206 : Część listy pakietu nie może być pusta.
                      21207 : Lista elementów pakietu nie może być pusta.
                      21208 : Czas oczekiwania na requesty upload lub finish został przekroczony.
                      21211 : Nieprawidłowa deklaracja formularza dokumentu.
                      21212 : Nieprawidłowy wystawca dokumentu.
                      21216 : Nieprawidłowa kompresja.
                      21217 : Nieprawidłowe kodowanie znaków.
                      21218 : Duplikat faktury w kontekście pakietu.
                      21301 : Brak autoryzacji.
                      21302 : Token nieaktywny.
                      21303 : Token unieważniony.
                      21304 : Brak uwierzytelnienia.
                      21305 : Brak uwierzytelnienia certyfikatu.
                      21306 : Nieprawidłowa operacja na uprawnieniach.
                      21401 : Dokument nie jest zgodny ze schemą (xsd).
                      21402 : Nieprawidłowy rozmiar pliku.
                      21403 : Nieprawidłowy skrót pliku.
                      21404 : Nieprawidłowy format dokumentu (json).
                      21405 : Dokument nie jest zgodny ze schemą (json).
                      21406 : Konflikt podpisu i typu uwierzytelnienia.
                      21407 : Nieprawidłowy podmiot podpisu.
                      21409 : Token o podanym identyfikatorze nie istnieje.
                      21410 : Nieprawidłowy kontekst szyfrowania.
                      21411 : Nieprawidłowe kodowanie.
                      21412 : Nieprawidłowy klucz szyfrujacy.
                      21413 : Nieprawidłowy typ zapytania (plain/encrypted).
                      21414 : Nieobsługiwana wersja zapytania.
                      21415 : Brak odszyfrowanego klucza dla sesji w Podprocesie Uwierzytelniania.
                      21416 : Wersja dokumentu niezgodna z zadeklarowaną podczas nawiązywania sesji.
                      21417 : Nieobsługiwana wersja dokumentu
                      23001 : Brak treści [STRING].
                      24001 : Nieprawidłowy numer referencyjny.
                      24002 : Nieprawidłowa suma kontrolna identyfikatora wewnętrznego.
                    </details>
          required:
            - id
            - status
            - party
            - taxId
            - sourceSystem
            - source
            - reason
    InvoiceEvent:
      anyOf:
        - $ref: '#/components/schemas/InvoiceAccepted'
        - $ref: '#/components/schemas/InvoiceSent'
        - $ref: '#/components/schemas/InvoiceRegistered'
        - $ref: '#/components/schemas/InvoiceConfirmed'
        - $ref: '#/components/schemas/InvoiceRejected'
      required:
        - status
      properties:
        status:
          $ref: '#/components/schemas/InvoiceStatus'
      discriminator:
        propertyName: status
        mapping:
          ACCEPTED: '#/components/schemas/InvoiceAccepted'
          SENT: '#/components/schemas/InvoiceSent'
          REGISTERED: '#/components/schemas/InvoiceRegistered'
          CONFIRMED: '#/components/schemas/InvoiceConfirmed'
          REJECTED: '#/components/schemas/InvoiceRejected'
    InvoiceEvents:
      description: Aggregated invoice events.
      type: array
      minItems: 1
      maxItems: 1000
      items:
        $ref: '#/components/schemas/InvoiceEvent'
  headers:
    X-Total-Count:
      description: Total number of elements available.
