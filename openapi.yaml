      type: array
      minItems: 1
      maxItems: 1000
      items:
        type: object
        required:
          - metadata
        properties:
          header:
            type: string
            description: Header
            minLength: 3
            maxLength: 512
          metadata:
            $ref: '#/components/schemas/KeyValueMetadata'
          text:
            type: object
            description: Text part of data block
            properties:
              paragraph:
                type: array
                description: Description paragraphs
                minItems: 1
                maxItems: 10
                items:
                  type: string
                  minLength: 1
                  maxLength: 512
          table:
            type: array
            description: Tables
            minItems: 1
            maxItems: 1000
            items:
              type: object
              required:
                - header
                - row
              properties:
                metadata:
                  $ref: '#/components/schemas/KeyValueMetadata'
                description:
                  type: string
                  description: Table description
                  minLength: 1
                  maxLength: 512
                header:
                  type: object
                  description: Table header
                  required:
                    - column
                  properties:
                    column:
                      type: array
                      description: Column definitions
                      minItems: 1
                      maxItems: 20
                      items:
                        $ref: '#/components/schemas/ColumnDefinition'
                row:
                  type: array
                  description: Table rows
                  minItems: 1
                  maxItems: 1000
                  items:
