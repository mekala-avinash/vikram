                        echo "✓ App Settings synced (${#SETTINGS_ARGS[@]} values)"
                      fi

                - task: AzureCLI@2
                  displayName: 'Upload XSLT map to Integration Account'
                  condition: and(succeeded(), ne(variables['logicAppIntegrationAccountName'], ''))
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      az logic integration-account map create \
                        --resource-group "$(azureResourceGroup)" \
                        --integration-account-name "$(logicAppIntegrationAccountName)" \
                        --name "KsefFa3" \
                        --map-type "Xslt" \
                        --content-type "application/xml" \
                        --content @logic-app/maps/KsefFa3.xslt \
                        --output none
                      echo "✓ Map uploaded: KsefFa3.xslt"

                - task: AzureCLI@2
                  displayName: 'Upload schemas to Integration Account'
                  condition: and(succeeded(), ne(variables['logicAppIntegrationAccountName'], ''))
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      set -euo pipefail
                      for xsd in logic-app/schemas/*.xsd; do
                        name="$(basename "${xsd%.*}")"
                        az logic integration-account schema create \
                          --resource-group "$(azureResourceGroup)" \
                          --integration-account-name "$(logicAppIntegrationAccountName)" \
                          --name "$name" \
                          --schema-type "Xml" \
                          --content-type "application/xml" \
                          --content @"$xsd" \
                          --output none
                        echo "✓ Schema uploaded: $name"
                      done

  # ── PRODUCTION ─────────────────────────────────────────────────────────────
  - stage: Deploy_Production
    displayName: 'Deploy → Production'
    dependsOn: Deploy_Staging
    condition: succeeded()
    variables:
      - group: ksef-logicapp-prod
    jobs:
      - deployment: DeployLogicApp
        displayName: 'Deploy Logic App (production)'
        environment: ksef-prod
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - bash: |
                    cp environments/production/parameters.json logic-app/parameters.json
                    echo "Staged environments/production/parameters.json → logic-app/parameters.json"
                  displayName: 'Stage env parameters'

                - task: AzureCLI@2
                  displayName: 'Zip deploy Logic App'
